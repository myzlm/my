name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 核心！利用 GitHub Secrets 把 API 地址注入到 config.js
      - name: Inject API Config
        run: |
          echo "const API_BASE = '${{ secrets.API_BASE }}';" > config.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
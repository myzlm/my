<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>万壑松风 · 雅集</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src https://endorsed-mariah-said-bags.trycloudflare.com;">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" />
    <style>
        /* ====== 古风样式（精简版） ====== */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Noto Serif SC', serif;
            background: #f7f2e8;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
        }
        /* 云雾 */
        .clouds-layer { position:fixed; bottom:0; left:0; width:100%; height:60%; pointer-events:none; z-index:1; }
        .cloud { position:absolute; background:radial-gradient(ellipse at center, rgba(255,252,245,0.5) 0%, transparent 70%); border-radius:50%; filter:blur(24px); }
        .cloud-1 { width:300px; height:80px; bottom:40%; left:-5%; animation:cloudDrift 25s linear infinite; opacity:0.4; }
        .cloud-2 { width:250px; height:60px; bottom:30%; left:60%; animation:cloudDrift 30s linear infinite; animation-delay:-10s; opacity:0.35; }
        .cloud-3 { width:350px; height:90px; bottom:20%; left:20%; animation:cloudDrift 35s linear infinite; animation-delay:-18s; opacity:0.4; }
        @keyframes cloudDrift { from { transform:translateX(-400px); } to { transform:translateX(calc(100vw + 450px)); } }

        /* 花瓣 */
        .petals { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:3; overflow:hidden; }
        .petal { position:absolute; top:-30px; width:12px; height:16px; background:radial-gradient(ellipse at 35% 30%, rgba(235,175,160,0.7), rgba(220,145,130,0.4) 40%, transparent 70%); border-radius:45% 55% 50% 50%; animation:petalFall 8s linear infinite; opacity:0; }
        .petal:nth-child(1) { left:10%; animation-duration:7.2s; animation-delay:0s; }
        .petal:nth-child(2) { left:30%; animation-duration:8.5s; animation-delay:1.5s; }
        .petal:nth-child(3) { left:50%; animation-duration:6.8s; animation-delay:3s; }
        .petal:nth-child(4) { left:70%; animation-duration:9s; animation-delay:0.6s; }
        .petal:nth-child(5) { left:90%; animation-duration:7.6s; animation-delay:4.2s; }
        @keyframes petalFall {
            0% { transform:translateY(-60px) rotate(0deg) scale(0.6); opacity:0; }
            10% { opacity:0.7; }
            50% { transform:translateY(50vh) rotate(180deg) scale(0.9); opacity:0.6; }
            90% { opacity:0.2; }
            100% { transform:translateY(105vh) rotate(360deg) scale(0.3); opacity:0; }
        }

        /* 登录卡片 */
        .login-container {
            position:relative; z-index:10;
            width:380px; max-width:90%;
            background:rgba(253,250,243,0.5);
            border:1px solid rgba(140,120,90,0.4);
            border-radius:6px;
            padding:40px 30px;
            box-shadow:0 6px 28px rgba(40,20,10,0.12);
            text-align:center;
            backdrop-filter:blur(8px);
        }
        .login-container::before {
            content:''; position:absolute; top:6px; left:6px; right:6px; bottom:6px;
            border:1px solid rgba(180,140,70,0.15);
            border-radius:3px;
            pointer-events:none;
            background:repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(180,140,70,0.04) 8px, rgba(180,140,70,0.04) 9px);
        }
        .login-container::after {
            content:'◆ ◇ ◆ ◇ ◆';
            position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
            font-size:0.5rem; color:rgba(180,140,70,0.15);
            letter-spacing:4px;
            white-space:nowrap;
        }
        .login-title { font-family:'ZCOOL XiaoWei', cursive; font-size:2.2rem; color:#2a2218; }
        .login-title::after {
            content:''; display:block; width:60%; height:2px; margin:6px auto 0;
            background:linear-gradient(90deg, transparent, #b8944b, transparent);
            opacity:0.4;
        }
        .login-subtitle { font-size:0.9rem; color:#8a7b65; margin-bottom:28px; letter-spacing:0.2em; }
        .input-group { margin-bottom:18px; text-align:left; }
        .input-group label { display:block; font-size:0.85rem; color:#5c4f3a; margin-bottom:4px; font-family:'ZCOOL XiaoWei', cursive; }
        .input-group input { width:100%; padding:10px 14px; border:1px solid rgba(140,120,90,0.5); background:rgba(250,245,235,0.6); border-radius:4px; font-family:'Noto Serif SC', serif; color:#2a2218; outline:none; }
        .input-group input:focus { border-color:#b8944b; box-shadow:0 0 0 3px rgba(180,140,60,0.2); }
        .btn { width:100%; padding:12px; border:none; border-radius:4px; font-family:'ZCOOL XiaoWei', cursive; font-size:1.1rem; cursor:pointer; transition:0.3s; margin-top:8px; }
        .btn-login { background:#c43d3d; color:#fef8f0; }
        .btn-login:hover { background:#b53535; transform:translateY(-1px); }
        .btn-guest { background:rgba(255,255,255,0.2); color:#5c4f3a; border:1px solid rgba(140,120,90,0.5); }
        .btn-guest:hover { background:rgba(180,140,60,0.15); border-color:#b8944b; }
        .error-msg { color:#c43d3d; font-size:0.8rem; min-height:20px; margin-top:6px; }

        /* 主界面 */
        .main-app { display:none; width:100%; max-width:900px; margin:0 auto; padding:20px; position:relative; z-index:10; }
        .header-plaque {
            text-align:center; margin:0 auto 20px;
            background:linear-gradient(180deg, #4a3525, #3d2a1a, #5c3d28, #4a3020, #3d2518, #4a3020, #5c3d28, #3d2a1a, #4a3525);
            padding:14px 40px; display:inline-block; border-radius:6px;
            border:3px solid #6b4d30; outline:2px solid #8b6d4a; outline-offset:-8px;
            color:#e8d5a3; font-size:1.8rem; font-family:'ZCOOL XiaoWei', cursive; letter-spacing:0.18em;
            box-shadow:inset 0 2px 4px rgba(255,220,160,0.1), inset 0 -3px 4px rgba(0,0,0,0.3), 0 6px 24px rgba(30,15,5,0.4);
            text-shadow:0 1px 2px rgba(0,0,0,0.6), 0 0 20px rgba(220,180,100,0.3);
            animation:glow 4s ease-in-out infinite;
        }
        @keyframes glow { 50% { text-shadow:0 1px 2px rgba(0,0,0,0.6), 0 0 40px rgba(220,180,100,0.5); } }
        .header-plaque::after {
            content:'❖'; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            font-size:8px; color:rgba(200,160,90,0.2); letter-spacing:60px;
            white-space:nowrap; text-indent:-20px;
        }

        .toolbar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:20px; }
        .role-badge { font-size:0.9rem; background:rgba(180,140,60,0.15); padding:4px 16px; border-radius:20px; color:#5c4f3a; font-family:'ZCOOL XiaoWei', cursive; border:1px solid rgba(180,140,60,0.2); }
        .btn-sm { background:rgba(250,245,235,0.5); border:1px solid #b8944b; color:#2a2218; padding:6px 18px; border-radius:4px; cursor:pointer; font-family:'Noto Serif SC', serif; transition:0.2s; font-size:0.85rem; }
        .btn-sm:hover { background:rgba(180,140,60,0.2); box-shadow:0 0 12px rgba(180,140,60,0.15); }

        .filter-bar {
            display:flex; flex-wrap:wrap; gap:12px; margin-bottom:25px; align-items:center;
            background:rgba(253,250,243,0.4); backdrop-filter:blur(4px);
            padding:10px 16px; border-radius:6px; border:1px solid rgba(140,120,90,0.2);
        }
        .filter-bar input { flex:1; min-width:140px; padding:8px 14px; border:1px solid rgba(140,120,90,0.3); border-radius:4px; background:rgba(250,245,235,0.3); color:#2a2218; outline:none; }
        .filter-bar input:focus { border-color:#b8944b; }
        .category-tabs { display:flex; flex-wrap:wrap; gap:6px; }
        .category-tab { padding:4px 14px; border-radius:20px; border:1px solid rgba(140,120,90,0.3); background:transparent; color:#5c4f3a; cursor:pointer; font-size:0.8rem; transition:0.2s; }
        .category-tab:hover, .category-tab.active { background:#b8944b; color:#fff; border-color:#b8944b; }

        /* 卡片网格 */
        .cards-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:20px; }
        .card-link {
            display:flex; flex-direction:column;
            background:rgba(253,250,243,0.5); border:1px solid rgba(140,120,90,0.25);
            border-radius:6px; padding:16px;
            text-decoration:none; color:#2a2218;
            box-shadow:0 2px 12px rgba(40,20,10,0.05);
            transition:all 0.3s;
            position:relative;
            backdrop-filter:blur(4px);
            overflow:hidden;
        }
        .card-link:hover {
            transform:translateY(-4px);
            box-shadow:0 6px 24px rgba(180,140,60,0.2);
            border-color:rgba(180,140,70,0.5);
        }
        .card-link::before {
            content:''; position:absolute; left:0; top:10px; bottom:10px; width:3px;
            background:linear-gradient(180deg, #d46565, #c43d3d, #d46565);
            opacity:0.7;
        }
        .card-link::after {
            content:''; position:absolute; bottom:0; left:20%; right:20%; height:2px;
            background:radial-gradient(ellipse at center, rgba(200,160,80,0.3) 0%, transparent 70%);
            opacity:0; transition:0.3s;
        }
        .card-link:hover::after { opacity:1; }

        .card-seal {
            width:40px; height:40px; background:#c43d3d; color:#fef8f0;
            display:flex; align-items:center; justify-content:center;
            font-family:'ZCOOL XiaoWei', cursive; font-size:1.2rem;
            border-radius:3px; transform:rotate(-3deg);
            box-shadow:0 3px 8px rgba(180,40,30,0.25);
            animation:sealBreathe 4s ease-in-out infinite;
            margin-bottom:10px;
        }
        @keyframes sealBreathe { 50% { transform:rotate(-2deg) scale(1.03); } }
        .card-content h3 { font-family:'ZCOOL XiaoWei', cursive; font-size:1rem; margin-bottom:2px; }
        .card-desc { font-size:0.75rem; color:#8a7b65; }
        .card-meta { margin-top:10px; display:flex; justify-content:space-between; font-size:0.65rem; color:#8a7b65; border-top:1px dashed rgba(140,120,90,0.2); padding-top:6px; }
        .card-meta .category { background:rgba(180,140,60,0.1); padding:0 8px; border-radius:10px; }
        .card-meta .visits { opacity:0.6; }

        /* 管理员面板 */
        .admin-panel { background:rgba(250,245,235,0.5); border:1px solid rgba(180,140,60,0.3); border-radius:8px; padding:18px; margin-top:30px; backdrop-filter:blur(4px); }
        .admin-panel h3 { font-family:'ZCOOL XiaoWei', cursive; margin-bottom:14px; border-bottom:1px solid rgba(180,140,60,0.2); padding-bottom:6px; }
        .list-item { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px dashed rgba(140,120,90,0.15); font-size:0.85rem; }
        .list-item button { font-size:0.75rem; padding:2px 10px; }
        .form-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
        .form-row input { flex:1; padding:6px 10px; border:1px solid rgba(140,120,90,0.3); border-radius:4px; background:rgba(250,245,235,0.3); color:#2a2218; min-width:70px; }

        /* 底部诗词 & 涟漪 */
        .footer-poem { margin-top:30px; text-align:center; font-family:'ZCOOL XiaoWei', cursive; font-size:0.85rem; color:#8a7b65; opacity:0.6; border-top:1px solid rgba(140,120,90,0.15); padding-top:16px; font-style:italic; }
        .ripple {
            position:fixed; border-radius:50%;
            background:radial-gradient(circle, rgba(180,140,70,0.2) 0%, transparent 70%);
            transform:scale(0); animation:rippleAnim 0.8s ease-out forwards;
            pointer-events:none; z-index:999;
        }
        @keyframes rippleAnim { 0% { transform:scale(0); opacity:1; } 100% { transform:scale(4); opacity:0; } }

        @media (max-width:600px) { .cards-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>

    <!-- 云雾 -->
    <div class="clouds-layer">
        <div class="cloud cloud-1"></div><div class="cloud cloud-2"></div><div class="cloud cloud-3"></div>
    </div>
    <!-- 花瓣 -->
    <div class="petals">
        <span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal"></span><span class="petal"></span>
    </div>

    <!-- 登录 -->
    <div id="loginScreen" class="login-container">
        <div class="login-title">万壑松风</div>
        <div class="login-subtitle">· 雅集 · 登入</div>
        <form onsubmit="return false;">
            <div class="input-group"><label>账号</label><input type="text" id="usernameInput" autocomplete="username" /></div>
            <div class="input-group"><label>密码</label><input type="password" id="passwordInput" autocomplete="current-password" /></div>
        </form>
        <div class="error-msg" id="loginError"></div>
        <button class="btn btn-login" id="loginBtn">登 录</button>
        <button class="btn btn-guest" id="guestBtn">游客模式 · 直接进入</button>
    </div>

    <!-- 主界面 -->
    <div id="mainApp" class="main-app">
        <div style="text-align:center;"><div class="header-plaque">万壑松风 · 雅集</div></div>
        <div class="toolbar">
            <span class="role-badge" id="roleDisplay">👤 游客</span>
            <button class="btn-sm" id="logoutBtn">退出登录</button>
        </div>
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="搜索网站..." />
            <div class="category-tabs" id="categoryTabs"><button class="category-tab active" data-category="all">全部</button></div>
        </div>
        <div id="cardsContainer" class="cards-grid"></div>
        <div id="adminPanel" class="admin-panel" style="display:none;">
            <h3>⚙️ 管理员设置</h3>
            <div style="display:flex; gap:16px; flex-wrap:wrap;">
                <div style="flex:1; min-width:180px;">
                    <h4 style="font-family:'ZCOOL XiaoWei',cursive; font-weight:normal; color:#5c4f3a; margin-bottom:8px;">账号管理</h4>
                    <form onsubmit="return false;">
                        <div class="form-row">
                            <input type="text" id="newUser" placeholder="新账号" />
                            <input type="password" id="newPass" placeholder="密码" />
                            <button class="btn-sm" id="addUserBtn">添加</button>
                        </div>
                    </form>
                    <div id="userList" style="max-height:140px; overflow-y:auto;"></div>
                </div>
                <div style="flex:1; min-width:220px;">
                    <h4 style="font-family:'ZCOOL XiaoWei',cursive; font-weight:normal; color:#5c4f3a; margin-bottom:8px;">网站列表管理</h4>
                    <form onsubmit="return false;">
                        <div class="form-row">
                            <input type="text" id="newSiteName" placeholder="名称" />
                            <input type="text" id="newSiteUrl" placeholder="网址" />
                        </div>
                        <div class="form-row">
                            <input type="text" id="newSiteDesc" placeholder="描述" />
                            <input type="text" id="newSiteSeal" placeholder="印章" maxlength="2" style="max-width:70px;" />
                            <input type="text" id="newSiteCategory" placeholder="分类" />
                            <button class="btn-sm" id="addSiteBtn">添加</button>
                        </div>
                    </form>
                    <div id="siteManageList" style="max-height:180px; overflow-y:auto;"></div>
                </div>
            </div>
        </div>
        <div class="footer-poem" id="poemDisplay"></div>
    </div>

    <script>
        (function() {
            'use strict';

            // ===== 配置 =====
            const API_BASE = 'https://endorsed-mariah-said-bags.trycloudflare.com';
            let currentUser = null;
            let sitesData = [];
            let currentCategory = 'all';
            let searchKeyword = '';

            // ===== DOM 引用 =====
            const loginScreen = document.getElementById('loginScreen');
            const mainApp = document.getElementById('mainApp');
            const usernameInput = document.getElementById('usernameInput');
            const passwordInput = document.getElementById('passwordInput');
            const loginError = document.getElementById('loginError');
            const loginBtn = document.getElementById('loginBtn');
            const guestBtn = document.getElementById('guestBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const roleDisplay = document.getElementById('roleDisplay');
            const cardsContainer = document.getElementById('cardsContainer');
            const adminPanel = document.getElementById('adminPanel');
            const userListEl = document.getElementById('userList');
            const siteManageListEl = document.getElementById('siteManageList');
            const newUserInput = document.getElementById('newUser');
            const newPassInput = document.getElementById('newPass');
            const addUserBtn = document.getElementById('addUserBtn');
            const newSiteName = document.getElementById('newSiteName');
            const newSiteUrl = document.getElementById('newSiteUrl');
            const newSiteDesc = document.getElementById('newSiteDesc');
            const newSiteSeal = document.getElementById('newSiteSeal');
            const newSiteCategory = document.getElementById('newSiteCategory');
            const addSiteBtn = document.getElementById('addSiteBtn');
            const searchInput = document.getElementById('searchInput');
            const categoryTabs = document.getElementById('categoryTabs');
            const poemDisplay = document.getElementById('poemDisplay');

            // ===== 诗词 =====
            const poems = [
                '松风吹解带，山月照弹琴。', '万壑树声满，千崖秋气高。',
                '空山新雨后，天气晚来秋。', '明月松间照，清泉石上流。',
                '竹喧归浣女，莲动下渔舟。', '随意春芳歇，王孙自可留。',
                '山光悦鸟性，潭影空人心。', '曲径通幽处，禅房花木深。'
            ];
            function setPoem() {
                if (poemDisplay) {
                    const idx = Math.floor(Math.random() * poems.length);
                    poemDisplay.textContent = '『 ' + poems[idx] + ' 』';
                }
            }

            // ===== API =====
            async function apiRequest(endpoint, options = {}) {
                const headers = { 'Content-Type': 'application/json' };
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    ...options,
                    headers,
                    credentials: 'include'
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || `请求失败 (${res.status})`);
                return data;
            }

            // ===== 界面切换 =====
            function showLogin() { loginScreen.style.display = 'block'; mainApp.style.display = 'none'; }
            function showApp() { loginScreen.style.display = 'none'; mainApp.style.display = 'block'; setPoem(); renderAll(); }

            // ===== 登录 =====
            loginBtn.addEventListener('click', async () => {
                const username = usernameInput.value.trim();
                const password = passwordInput.value;
                if (!username || !password) { loginError.textContent = '请输入账号和密码'; return; }
                try {
                    const res = await apiRequest('/api/login', {
                        method: 'POST',
                        body: JSON.stringify({ username, password })
                    });
                    loginError.textContent = '';
                    let role = res.role || 'user';
                    if (username === 'zlm' && role !== 'admin') role = 'admin';
                    currentUser = { username, role };
                    sessionStorage.setItem('gufeng_user', JSON.stringify(currentUser));
                    showApp();
                } catch (err) {
                    loginError.textContent = err.message;
                }
            });

            guestBtn.addEventListener('click', () => {
                currentUser = { username: '游客', role: 'guest' };
                sessionStorage.setItem('gufeng_user', JSON.stringify(currentUser));
                showApp();
            });

            logoutBtn.addEventListener('click', async () => {
                try { await apiRequest('/api/logout', { method: 'POST' }); } catch (e) {}
                currentUser = null;
                sessionStorage.removeItem('gufeng_user');
                showLogin();
            });

            function restoreSession() {
                const stored = sessionStorage.getItem('gufeng_user');
                if (stored) {
                    try { const parsed = JSON.parse(stored); if (parsed && parsed.username) { currentUser = parsed; return true; } } catch (e) {}
                }
                return false;
            }

            // ===== 加载数据 =====
            async function loadSites() {
                try {
                    const sites = await apiRequest('/api/sites');
                    sitesData = sites;
                    return sites;
                } catch (e) {
                    console.error('加载失败', e);
                    sitesData = [];
                    return [];
                }
            }

            function getCategories(sites) {
                const cats = new Set(sites.map(s => s.category || '其他'));
                return ['全部', ...Array.from(cats)];
            }

            function renderCategoryTabs(cats) {
                categoryTabs.innerHTML = '';
                cats.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'category-tab' + (cat === currentCategory ? ' active' : '');
                    btn.textContent = cat;
                    btn.addEventListener('click', () => {
                        currentCategory = cat;
                        renderCategoryTabs(getCategories(sitesData));
                        renderCards();
                    });
                    categoryTabs.appendChild(btn);
                });
            }

            // ===== 涟漪特效 =====
            function createRipple(x, y) {
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                const size = Math.min(window.innerWidth, window.innerHeight) * 0.35;
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (x - size/2) + 'px';
                ripple.style.top = (y - size/2) + 'px';
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 900);
            }

            // ===== 渲染卡片 =====
            function renderCards() {
                const filtered = sitesData.filter(site => {
                    const matchCat = currentCategory === '全部' || site.category === currentCategory;
                    const keyword = searchKeyword.toLowerCase().trim();
                    const matchSearch = !keyword || site.name.toLowerCase().includes(keyword) || (site.desc && site.desc.toLowerCase().includes(keyword));
                    return matchCat && matchSearch;
                });
                cardsContainer.innerHTML = '';
                if (filtered.length === 0) {
                    cardsContainer.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#8a7b65;">暂无网站</p>';
                    return;
                }
                filtered.forEach((site, idx) => {
                    const a = document.createElement('a');
                    a.className = 'card-link';
                    a.href = site.url || '#';
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.dataset.index = sitesData.indexOf(site);

                    const seal = document.createElement('div');
                    seal.className = 'card-seal';
                    seal.textContent = site.seal || '🔗';

                    const content = document.createElement('div');
                    content.className = 'card-content';
                    const h3 = document.createElement('h3');
                    h3.textContent = site.name || '未命名';
                    const desc = document.createElement('div');
                    desc.className = 'card-desc';
                    desc.textContent = site.desc || '';
                    content.appendChild(h3);
                    content.appendChild(desc);

                    const meta = document.createElement('div');
                    meta.className = 'card-meta';
                    const catSpan = document.createElement('span');
                    catSpan.className = 'category';
                    catSpan.textContent = site.category || '其他';
                    const visitsSpan = document.createElement('span');
                    visitsSpan.className = 'visits';
                    visitsSpan.textContent = `👁 ${site.visits || 0}`;
                    meta.appendChild(catSpan);
                    meta.appendChild(visitsSpan);

                    a.appendChild(seal);
                    a.appendChild(content);
                    a.appendChild(meta);

                    a.addEventListener('click', function(e) {
                        createRipple(e.clientX, e.clientY);
                        const idx = parseInt(this.dataset.index);
                        if (!isNaN(idx) && idx >= 0 && idx < sitesData.length) {
                            apiRequest(`/api/sites/${idx}/visit`, { method: 'POST' })
                                .then(() => {
                                    sitesData[idx].visits = (sitesData[idx].visits || 0) + 1;
                                    const v = this.querySelector('.visits');
                                    if (v) v.textContent = `👁 ${sitesData[idx].visits}`;
                                })
                                .catch(e => console.warn('统计失败', e));
                        }
                    });

                    cardsContainer.appendChild(a);
                });
            }

            // ===== 管理面板 =====
            function renderUserList(users) {
                userListEl.innerHTML = '';
                users.forEach(user => {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    const span = document.createElement('span');
                    span.textContent = user.username + (user.username === 'zlm' ? ' (管理员)' : '');
                    div.appendChild(span);
                    if (user.username !== 'zlm') {
                        const delBtn = document.createElement('button');
                        delBtn.className = 'btn-sm';
                        delBtn.textContent = '删除';
                        delBtn.addEventListener('click', async () => {
                            if (!confirm(`确定删除 ${user.username} 吗？`)) return;
                            try {
                                await apiRequest(`/api/users/${user.username}`, { method: 'DELETE' });
                                const updated = await apiRequest('/api/users');
                                renderUserList(updated);
                            } catch (e) { alert(e.message); }
                        });
                        div.appendChild(delBtn);
                    }
                    userListEl.appendChild(div);
                });
            }

            function renderSiteManageList(sites) {
                siteManageListEl.innerHTML = '';
                sites.forEach((site, idx) => {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    const span = document.createElement('span');
                    span.textContent = `${site.name} (${site.url})`;
                    div.appendChild(span);
                    const delBtn = document.createElement('button');
                    delBtn.className = 'btn-sm';
                    delBtn.textContent = '删除';
                    delBtn.addEventListener('click', async () => {
                        if (!confirm(`确定删除 ${site.name} 吗？`)) return;
                        try {
                            await apiRequest(`/api/sites/${idx}`, { method: 'DELETE' });
                            const updated = await apiRequest('/api/sites');
                            sitesData = updated;
                            renderAll();
                        } catch (e) { alert(e.message); }
                    });
                    div.appendChild(delBtn);
                    siteManageListEl.appendChild(div);
                });
            }

            // ===== 主渲染 =====
            async function renderAll() {
                if (!currentUser) { showLogin(); return; }
                let roleText = '游客';
                if (currentUser.role === 'admin') roleText = '管理员';
                else if (currentUser.role === 'user') roleText = '成员';
                roleDisplay.textContent = roleText;
                adminPanel.style.display = (currentUser.role === 'admin') ? 'block' : 'none';

                await loadSites();
                const cats = getCategories(sitesData);
                renderCategoryTabs(cats);
                renderCards();

                if (currentUser.role === 'admin') {
                    try {
                        const users = await apiRequest('/api/users');
                        renderUserList(users);
                    } catch (e) {
                        userListEl.innerHTML = '<p style="color:#c43d3d;">加载失败</p>';
                    }
                    renderSiteManageList(sitesData);
                }
            }

            // ===== 搜索 =====
            searchInput.addEventListener('input', (e) => { searchKeyword = e.target.value; renderCards(); });

            // ===== 管理员操作 =====
            addUserBtn.addEventListener('click', async () => {
                const u = newUserInput.value.trim(), p = newPassInput.value;
                if (!u || !p) return alert('账号密码不能为空');
                try {
                    await apiRequest('/api/users', { method: 'POST', body: JSON.stringify({ username: u, password: p }) });
                    alert('添加成功');
                    newUserInput.value = ''; newPassInput.value = '';
                    const users = await apiRequest('/api/users');
                    renderUserList(users);
                } catch (e) { alert(e.message); }
            });

            addSiteBtn.addEventListener('click', async () => {
                const name = newSiteName.value.trim(), url = newSiteUrl.value.trim();
                const desc = newSiteDesc.value.trim(), seal = newSiteSeal.value.trim();
                const category = newSiteCategory.value.trim() || '其他';
                if (!name || !url) return alert('名称和网址必填');
                try {
                    await apiRequest('/api/sites', { method: 'POST', body: JSON.stringify({ name, url, desc, seal, category }) });
                    alert('添加成功');
                    ['newSiteName','newSiteUrl','newSiteDesc','newSiteSeal','newSiteCategory'].forEach(id => document.getElementById(id).value = '');
                    await loadSites();
                    renderAll();
                } catch (e) { alert(e.message); }
            });

            // ===== 启动 =====
            window.addEventListener('load', () => {
                const restored = restoreSession();
                if (restored && currentUser && currentUser.username !== '游客') {
                    showApp();
                } else {
                    showLogin();
                }
                setPoem();
            });

        })();
    </script>
</body>
</html>

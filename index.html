<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>墨韵·书签雅集</title>
  <!-- 引入古风字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-pc: url('bg-pc.png');
      --bg-mobile: url('bg-mobile.png');
      --ink: #2c2c2c;
      --red-seal: #c53b3b;
      --gold: #b89b5a;
      --parchment: rgba(250, 245, 235, 0.85);
      --shadow-soft: 0 8px 20px rgba(0, 0, 0, 0.15);
      --transition: 0.3s ease;
    }

    body {
      font-family: 'ZCOOL XiaoWei', 'Ma Shan Zheng', 'KaiTi', '楷体', serif;
      min-height: 100vh;
      background: var(--bg-pc) center/cover no-repeat fixed;
      backdrop-filter: blur(1px);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
      color: var(--ink);
    }

    /* 移动端背景切换 */
    @media (max-width: 768px) {
      body {
        background: var(--bg-mobile) center/cover no-repeat fixed;
        padding: 1rem 0.5rem;
      }
    }

    /* ---- 白云环绕特效 ---- */
    .clouds {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .cloud {
      position: absolute;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      filter: blur(18px);
      opacity: 0.5;
      animation: floatCloud linear infinite;
    }
    .cloud::after,
    .cloud::before {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }
    .cloud::before {
      width: 70%;
      height: 70%;
      top: -35%;
      left: 15%;
    }
    .cloud::after {
      width: 50%;
      height: 50%;
      top: -25%;
      right: 10%;
    }
    @keyframes floatCloud {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(120vw); }
    }

    /* ---- 落花特效 ---- */
    #petalCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* 主容器：宣纸质感的卡片 */
    .main-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1200px;
      background: var(--parchment);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      box-shadow: var(--shadow-soft), inset 0 0 30px rgba(0,0,0,0.05);
      padding: 2rem 2rem 2.5rem;
      border: 1px solid rgba(180, 150, 100, 0.3);
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* 头部 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 2px dashed #c5a46b;
      padding-bottom: 1rem;
    }
    .title {
      font-size: 2.8rem;
      font-family: 'Ma Shan Zheng', cursive;
      color: #3e2e1f;
      letter-spacing: 6px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    .user-area {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .greeting {
      font-size: 1.2rem;
      color: #5a4a32;
    }
    .btn {
      background: transparent;
      border: 1px solid #9e8b6b;
      color: #4a3b28;
      padding: 0.5rem 1.2rem;
      border-radius: 30px;
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
      transition: all var(--transition);
      backdrop-filter: blur(4px);
      background: rgba(255, 250, 240, 0.4);
      letter-spacing: 1px;
    }
    .btn:hover {
      background: #c5a46b;
      color: #fff;
      border-color: #c5a46b;
      box-shadow: 0 4px 12px rgba(180, 140, 80, 0.3);
    }
    .btn.admin-btn {
      border-color: #b88a4b;
      color: #7a5c3a;
      font-weight: bold;
    }

    /* 网站卡片网格 */
    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.5rem;
    }
    .site-card {
      background: rgba(255, 255, 250, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid #dcc79b;
      border-radius: 20px;
      padding: 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all var(--transition);
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
    }
    .site-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.12);
      background: rgba(255, 255, 250, 0.9);
      border-color: #b89b5a;
    }
    .seal {
      width: 50px;
      height: 50px;
      min-width: 50px;
      background: #c53b3b;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-family: 'Ma Shan Zheng', cursive;
      box-shadow: 0 2px 8px rgba(180, 60, 60, 0.4);
      text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
    }
    .site-info {
      flex: 1;
      min-width: 0;
    }
    .site-name {
      font-size: 1.3rem;
      font-weight: bold;
      color: #3e2e1f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .site-desc {
      font-size: 0.9rem;
      color: #6b5d4b;
      margin-top: 0.2rem;
    }
    .site-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #9b8b72;
      margin-top: 0.4rem;
    }
    .site-category {
      background: #e7dcc8;
      padding: 0.1rem 0.6rem;
      border-radius: 20px;
    }

    /* 模态框 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.3s ease, visibility 0.3s;
    }
    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .modal {
      background: #fdf8f0;
      border-radius: 32px;
      padding: 2rem;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      border: 1px solid #c5a46b;
      position: relative;
    }
    .modal h2 {
      text-align: center;
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 2rem;
      margin-bottom: 1.5rem;
      color: #4a3828;
    }
    .input-group {
      margin-bottom: 1.2rem;
    }
    .input-group label {
      display: block;
      margin-bottom: 0.3rem;
      color: #5a4a32;
    }
    .input-group input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid #cfbfa0;
      border-radius: 30px;
      background: rgba(255,255,250,0.8);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
    }
    .modal-actions {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .close-btn {
      position: absolute;
      top: 10px; right: 20px;
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: #8b7a62;
    }

    /* 管理面板 */
    .admin-panel {
      background: rgba(245, 240, 230, 0.8);
      border-radius: 20px;
      padding: 1.5rem;
      border: 1px solid #d4b896;
      margin-top: 1rem;
    }
    .tab-buttons {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 1.2rem;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px dashed #d4b896;
    }
    .warning {
      color: #b45f5f;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <!-- 白云层 -->
  <div class="clouds" id="cloudsContainer"></div>

  <!-- 落花画布 -->
  <canvas id="petalCanvas"></canvas>

  <!-- 主界面 -->
  <div class="main-container">
    <div class="header">
      <h1 class="title">🌸 墨韵·书签雅集</h1>
      <div class="user-area" id="userArea">
        <span class="greeting" id="greetingText">未登录·游客</span>
        <button class="btn" id="loginBtn">登 录</button>
        <button class="btn admin-btn" id="adminPanelBtn" style="display:none;">管理</button>
        <button class="btn" id="logoutBtn" style="display:none;">登出</button>
      </div>
    </div>

    <!-- 网站卡片区 -->
    <div class="sites-grid" id="sitesGrid"></div>

    <!-- 用户申请添加网站按钮（仅用户可见） -->
    <div style="text-align:right; margin-top:1rem;" id="userApplyArea" hidden>
      <button class="btn" id="applySiteBtn">📜 申请添加网站</button>
    </div>

    <!-- 管理员面板 -->
    <div class="admin-panel" id="adminPanel" style="display:none;">
      <h3 style="font-family:'Ma Shan Zheng'; font-size:1.8rem;">🔰 管理面板</h3>
      <div class="tab-buttons">
        <button class="btn tab-btn active" data-tab="siteManage">网站管理</button>
        <button class="btn tab-btn" data-tab="userManage">用户管理</button>
        <button class="btn tab-btn" data-tab="applyManage">待审核申请</button>
      </div>
      <!-- 网站管理 -->
      <div class="tab-content active" id="siteManage">
        <div style="margin-bottom:1rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
          <input type="text" id="newSiteName" placeholder="网站名称" class="input-group input">
          <input type="text" id="newSiteUrl" placeholder="网址" class="input-group input">
          <input type="text" id="newSiteDesc" placeholder="描述" class="input-group input">
          <input type="text" id="newSiteSeal" placeholder="印章(1字)" maxlength="2" class="input-group input">
          <input type="text" id="newSiteCat" placeholder="分类" class="input-group input">
          <button class="btn" id="addSiteBtn">添加网站</button>
        </div>
        <div id="siteListManage"></div>
      </div>
      <!-- 用户管理 -->
      <div class="tab-content" id="userManage">
        <div style="margin-bottom:1rem; display:flex; gap:0.5rem;">
          <input type="text" id="newUsername" placeholder="新用户名" class="input-group input">
          <input type="password" id="newUserPass" placeholder="密码" class="input-group input">
          <button class="btn" id="addUserBtn">添加用户</button>
        </div>
        <div id="userListManage"></div>
        <p class="warning">※ 修改他人密码：将删除原用户并重新创建相同用户名（无数据损失）。修改主管理员密码需后端支持。</p>
      </div>
      <!-- 审核申请 -->
      <div class="tab-content" id="applyManage">
        <div id="applyListManage"></div>
      </div>
    </div>
  </div>

  <!-- 登录模态框 -->
  <div class="modal-overlay" id="loginModal">
    <div class="modal">
      <button class="close-btn" id="closeLoginModal">&times;</button>
      <h2>登录书斋</h2>
      <div class="input-group">
        <label>账号</label>
        <input type="text" id="loginUsername" placeholder="请输入账号">
      </div>
      <div class="input-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="请输入密码">
      </div>
      <div class="modal-actions">
        <button class="btn" id="submitLogin">登 录</button>
      </div>
      <p style="text-align:center; margin-top:1rem; font-size:0.85rem; color:#8b7a62;">游客可浏览，登录后更多功能</p>
    </div>
  </div>

  <!-- 申请网站模态框 -->
  <div class="modal-overlay" id="applyModal">
    <div class="modal">
      <button class="close-btn" id="closeApplyModal">&times;</button>
      <h2>申请收录网站</h2>
      <div class="input-group">
        <label>网站名称</label>
        <input type="text" id="applyName" placeholder="必填">
      </div>
      <div class="input-group">
        <label>网址</label>
        <input type="text" id="applyUrl" placeholder="必填">
      </div>
      <div class="input-group">
        <label>描述</label>
        <input type="text" id="applyDesc">
      </div>
      <div class="input-group">
        <label>印章(一字)</label>
        <input type="text" id="applySeal" maxlength="2">
      </div>
      <div class="input-group">
        <label>分类</label>
        <input type="text" id="applyCat">
      </div>
      <div class="modal-actions">
        <button class="btn" id="submitApply">提交申请</button>
      </div>
    </div>
  </div>

  <!-- 修改密码模态框（管理员） -->
  <div class="modal-overlay" id="changePassModal">
    <div class="modal">
      <button class="close-btn" id="closeChangePassModal">&times;</button>
      <h2>修改密码</h2>
      <div class="input-group">
        <label>用户名</label>
        <input type="text" id="changePassUser" readonly>
      </div>
      <div class="input-group">
        <label>新密码</label>
        <input type="password" id="changePassNew">
      </div>
      <div class="modal-actions">
        <button class="btn" id="submitChangePass">确认修改</button>
      </div>
      <p class="warning" style="margin-top:0.5rem;">※ 管理员修改他人密码通过删除后重建实现；修改主管理员(zlm)密码需后端支持。</p>
    </div>
  </div>

  <script>
    (function() {
      // ---------- 配置 ----------
      const API_BASE = 'https://endorsed-mariah-said-bags.trycloudflare.com';
      // 本地申请存储键
      const APPLY_STORAGE_KEY = 'ink_nav_applications';

      // ---------- 全局状态 ----------
      let currentUser = null;   // { username, role }
      let sites = [];
      let localApplications = JSON.parse(localStorage.getItem(APPLY_STORAGE_KEY) || '[]');

      // ---------- DOM 元素 ----------
      const $ = (sel) => document.querySelector(sel);
      const $$ = (sel) => document.querySelectorAll(sel);

      // ---------- 工具函数 ----------
      function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return String(text).replace(/[&<>"']/g, m => map[m]);
      }

      async function apiCall(url, options = {}) {
        const config = {
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          ...options,
        };
        if (config.body && typeof config.body === 'object') {
          config.body = JSON.stringify(config.body);
        }
        const res = await fetch(API_BASE + url, config);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data.error || `请求失败 (${res.status})`);
        }
        return data;
      }

      // 更新UI状态
      function updateUIByRole() {
        const userArea = $('#userArea');
        const greeting = $('#greetingText');
        const loginBtn = $('#loginBtn');
        const logoutBtn = $('#logoutBtn');
        const adminBtn = $('#adminPanelBtn');
        const adminPanel = $('#adminPanel');
        const userApply = $('#userApplyArea');

        if (currentUser) {
          greeting.textContent = `${currentUser.role === 'admin' ? '🔰' : '📖'} ${currentUser.username}`;
          loginBtn.style.display = 'none';
          logoutBtn.style.display = 'inline-block';
          if (currentUser.role === 'admin') {
            adminBtn.style.display = 'inline-block';
            adminPanel.style.display = 'block';
            userApply.style.display = 'none'; // 管理员不需要申请入口
          } else {
            adminBtn.style.display = 'none';
            adminPanel.style.display = 'none';
            userApply.hidden = false;
          }
        } else {
          greeting.textContent = '未登录·游客';
          loginBtn.style.display = 'inline-block';
          logoutBtn.style.display = 'none';
          adminBtn.style.display = 'none';
          adminPanel.style.display = 'none';
          userApply.hidden = true;
        }
        renderSites();
        if (currentUser && currentUser.role === 'admin') {
          renderAdminPanels();
        }
      }

      // 渲染网站卡片
      function renderSites() {
        const grid = $('#sitesGrid');
        grid.innerHTML = '';
        sites.forEach((site, index) => {
          const card = document.createElement('a');
          card.className = 'site-card';
          card.href = site.url;
          card.target = '_blank';
          card.rel = 'noopener noreferrer';
          card.addEventListener('click', (e) => {
            // 记录访问
            apiCall(`/api/sites/${index}/visit`, { method: 'POST' }).catch(()=>{});
          });
          card.innerHTML = `
            <div class="seal">${escapeHtml(site.seal || '🔗')}</div>
            <div class="site-info">
              <div class="site-name">${escapeHtml(site.name)}</div>
              <div class="site-desc">${escapeHtml(site.desc || '')}</div>
              <div class="site-meta">
                <span class="site-category">${escapeHtml(site.category || '其他')}</span>
                <span>👁️ ${site.visits || 0}</span>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });
      }

      // 管理员面板渲染
      function renderAdminPanels() {
        renderSiteManage();
        renderUserManage();
        renderApplyManage();
      }

      function renderSiteManage() {
        const container = $('#siteListManage');
        container.innerHTML = sites.map((s, i) => `
          <div class="list-item">
            <span>${escapeHtml(s.name)} - <small>${escapeHtml(s.url)}</small></span>
            <button class="btn" data-del-site="${i}">删除</button>
          </div>
        `).join('');
        container.querySelectorAll('[data-del-site]').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const idx = e.target.dataset.delSite;
            if (!confirm('确认删除该网站？')) return;
            try {
              await apiCall(`/api/sites/${idx}`, { method: 'DELETE' });
              await refreshSites();
            } catch (err) { alert('删除失败: ' + err.message); }
          });
        });
      }

      async function refreshSites() {
        try {
          sites = await apiCall('/api/sites');
          renderSites();
          if (currentUser?.role === 'admin') renderSiteManage();
        } catch (e) { console.warn(e); }
      }

      async function refreshUsersAndRender() {
        if (!currentUser || currentUser.role !== 'admin') return;
        try {
          const users = await apiCall('/api/users');
          renderUserList(users);
        } catch (e) { console.warn(e); }
      }

      function renderUserManage() {
        // 触发加载用户列表
        refreshUsersAndRender();
      }

      function renderUserList(users) {
        const container = $('#userListManage');
        container.innerHTML = users.map(u => `
          <div class="list-item">
            <span>${escapeHtml(u.username)}</span>
            <div>
              <button class="btn change-pass-btn" data-username="${escapeHtml(u.username)}">改密</button>
              ${u.username !== 'zlm' ? `<button class="btn del-user-btn" data-username="${escapeHtml(u.username)}">删除</button>` : ''}
            </div>
          </div>
        `).join('');
        container.querySelectorAll('.del-user-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const username = e.target.dataset.username;
            if (!confirm(`确定删除用户 ${username}？`)) return;
            try {
              await apiCall(`/api/users/${encodeURIComponent(username)}`, { method: 'DELETE' });
              refreshUsersAndRender();
            } catch (err) { alert('删除失败: ' + err.message); }
          });
        });
        container.querySelectorAll('.change-pass-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const username = e.target.dataset.username;
            openChangePassModal(username);
          });
        });
      }

      function openChangePassModal(username) {
        $('#changePassUser').value = username;
        $('#changePassNew').value = '';
        $('#changePassModal').classList.add('active');
      }

      function renderApplyManage() {
        const container = $('#applyListManage');
        if (localApplications.length === 0) {
          container.innerHTML = '<p style="color:#8b7a62;">暂无待审核申请。</p>';
          return;
        }
        container.innerHTML = localApplications.map((app, idx) => `
          <div class="list-item">
            <span>${escapeHtml(app.name)} (${escapeHtml(app.url)})</span>
            <div>
              <button class="btn approve-btn" data-index="${idx}">通过</button>
              <button class="btn reject-btn" data-index="${idx}">拒绝</button>
            </div>
          </div>
        `).join('');
        container.querySelectorAll('.approve-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const idx = e.target.dataset.index;
            const app = localApplications[idx];
            try {
              await apiCall('/api/sites', {
                method: 'POST',
                body: {
                  name: app.name,
                  url: app.url,
                  desc: app.desc || '',
                  seal: app.seal || '🔗',
                  category: app.category || '其他'
                }
              });
              localApplications.splice(idx, 1);
              localStorage.setItem(APPLY_STORAGE_KEY, JSON.stringify(localApplications));
              await refreshSites();
              renderApplyManage();
              alert('网站已添加');
            } catch (err) { alert('添加失败: ' + err.message); }
          });
        });
        container.querySelectorAll('.reject-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const idx = e.target.dataset.index;
            if (confirm('拒绝该申请？')) {
              localApplications.splice(idx, 1);
              localStorage.setItem(APPLY_STORAGE_KEY, JSON.stringify(localApplications));
              renderApplyManage();
            }
          });
        });
      }

      // 登录/登出逻辑
      async function checkLoginStatus() {
        try {
          const data = await apiCall('/api/me');
          currentUser = data;
        } catch (e) {
          currentUser = null;
        }
        updateUIByRole();
        if (currentUser?.role === 'admin') {
          refreshUsersAndRender();
        }
      }

      // 初始化白云
      function initClouds() {
        const container = $('#cloudsContainer');
        container.innerHTML = '';
        for (let i = 0; i < 6; i++) {
          const cloud = document.createElement('div');
          cloud.className = 'cloud';
          const size = 80 + Math.random() * 100;
          cloud.style.width = size + 'px';
          cloud.style.height = size * 0.6 + 'px';
          cloud.style.top = (5 + Math.random() * 60) + '%';
          cloud.style.animationDuration = (15 + Math.random() * 25) + 's';
          cloud.style.animationDelay = Math.random() * 10 + 's';
          container.appendChild(cloud);
        }
      }

      // 落花canvas动画
      function initPetals() {
        const canvas = $('#petalCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        const petals = [];
        const petalCount = 35;

        function resize() {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        class Petal {
          constructor() {
            this.reset(true);
          }
          reset(initial = false) {
            this.x = Math.random() * width;
            this.y = initial ? Math.random() * height : -20;
            this.size = 8 + Math.random() * 14;
            this.speedY = 1 + Math.random() * 2.5;
            this.speedX = 0.3 + Math.random() * 0.8;
            this.rotation = Math.random() * Math.PI * 2;
            this.rotSpeed = (Math.random() - 0.5) * 0.02;
            this.opacity = 0.7 + Math.random() * 0.3;
            this.color = `rgba(232, 160, 170, ${this.opacity})`; // 淡粉
          }
          update() {
            this.y += this.speedY;
            this.x += Math.sin(this.y * 0.02) * this.speedX;
            this.rotation += this.rotSpeed;
            if (this.y > height + 20) {
              this.reset();
            }
          }
          draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.fillStyle = this.color;
            // 简单花瓣形状
            ctx.beginPath();
            ctx.ellipse(0, 0, this.size * 0.6, this.size * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(0, 0, this.size * 0.3, this.size * 0.6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        }

        for (let i = 0; i < petalCount; i++) {
          petals.push(new Petal());
        }

        function animate() {
          ctx.clearRect(0, 0, width, height);
          petals.forEach(p => {
            p.update();
            p.draw(ctx);
          });
          requestAnimationFrame(animate);
        }
        animate();
      }

      // 事件绑定
      function bindEvents() {
        // 登录模态框
        $('#loginBtn').addEventListener('click', () => $('#loginModal').classList.add('active'));
        $('#closeLoginModal').addEventListener('click', () => $('#loginModal').classList.remove('active'));
        $('#submitLogin').addEventListener('click', async () => {
          const username = $('#loginUsername').value.trim();
          const password = $('#loginPassword').value;
          if (!username || !password) return alert('请输入账号和密码');
          try {
            const data = await apiCall('/api/login', {
              method: 'POST',
              body: { username, password }
            });
            currentUser = { username: data.username, role: data.role };
            $('#loginModal').classList.remove('active');
            $('#loginUsername').value = '';
            $('#loginPassword').value = '';
            updateUIByRole();
            if (currentUser.role === 'admin') refreshUsersAndRender();
          } catch (err) {
            alert('登录失败: ' + err.message);
          }
        });

        $('#logoutBtn').addEventListener('click', async () => {
          await apiCall('/api/logout', { method: 'POST' });
          currentUser = null;
          updateUIByRole();
        });

        $('#adminPanelBtn').addEventListener('click', () => {
          const panel = $('#adminPanel');
          panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        });

        // 管理面板选项卡
        $$('.tab-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const tab = this.dataset.tab;
            $$('.tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            $$('.tab-content').forEach(c => c.classList.remove('active'));
            $('#' + tab).classList.add('active');
          });
        });

        // 添加网站
        $('#addSiteBtn').addEventListener('click', async () => {
          const name = $('#newSiteName').value.trim();
          const url = $('#newSiteUrl').value.trim();
          if (!name || !url) return alert('名称和网址必填');
          try {
            await apiCall('/api/sites', {
              method: 'POST',
              body: {
                name,
                url,
                desc: $('#newSiteDesc').value.trim(),
                seal: $('#newSiteSeal').value.trim() || '🔗',
                category: $('#newSiteCat').value.trim() || '其他'
              }
            });
            ['newSiteName','newSiteUrl','newSiteDesc','newSiteSeal','newSiteCat'].forEach(id => $('#'+id).value = '');
            await refreshSites();
          } catch (err) { alert(err.message); }
        });

        // 添加用户
        $('#addUserBtn').addEventListener('click', async () => {
          const username = $('#newUsername').value.trim();
          const password = $('#newUserPass').value;
          if (!username || !password) return alert('用户名和密码不能为空');
          try {
            await apiCall('/api/users', { method: 'POST', body: { username, password } });
            $('#newUsername').value = '';
            $('#newUserPass').value = '';
            refreshUsersAndRender();
          } catch (err) { alert(err.message); }
        });

        // 修改密码提交
        $('#submitChangePass').addEventListener('click', async () => {
          const username = $('#changePassUser').value;
          const newPass = $('#changePassNew').value;
          if (!newPass) return alert('请输入新密码');
          if (username === 'zlm') {
            // 主管理员密码修改需后端支持，模拟提示
            alert('修改主管理员密码需要后端专用接口，当前演示无法完成。请通过后端直接修改。');
            return;
          }
          // 对其他用户：先删除再创建
          if (!confirm(`将通过删除并重建用户“${username}”来修改密码，继续？`)) return;
          try {
            await apiCall(`/api/users/${encodeURIComponent(username)}`, { method: 'DELETE' });
            await apiCall('/api/users', { method: 'POST', body: { username, password: newPass } });
            alert('密码已修改');
            $('#changePassModal').classList.remove('active');
            refreshUsersAndRender();
          } catch (err) {
            alert('操作失败: ' + err.message + ' (可能原用户已不存在，请刷新)');
          }
        });
        $('#closeChangePassModal').addEventListener('click', () => $('#changePassModal').classList.remove('active'));

        // 申请网站模态框
        $('#applySiteBtn').addEventListener('click', () => $('#applyModal').classList.add('active'));
        $('#closeApplyModal').addEventListener('click', () => $('#applyModal').classList.remove('active'));
        $('#submitApply').addEventListener('click', () => {
          const name = $('#applyName').value.trim();
          const url = $('#applyUrl').value.trim();
          if (!name || !url) return alert('名称和网址必填');
          localApplications.push({
            name,
            url,
            desc: $('#applyDesc').value.trim(),
            seal: $('#applySeal').value.trim() || '🔗',
            category: $('#applyCat').value.trim() || '其他'
          });
          localStorage.setItem(APPLY_STORAGE_KEY, JSON.stringify(localApplications));
          alert('申请已提交，等待管理员审核。');
          $('#applyModal').classList.remove('active');
          ['applyName','applyUrl','applyDesc','applySeal','applyCat'].forEach(id => $('#'+id).value = '');
        });

        // 点击模态框外部关闭
        window.addEventListener('click', (e) => {
          if (e.target.classList.contains('modal-overlay')) {
            e.target.classList.remove('active');
          }
        });
      }

      // 启动
      async function init() {
        initClouds();
        initPetals();
        bindEvents();
        try {
          sites = await apiCall('/api/sites');
        } catch (e) {
          console.warn('获取网站列表失败，使用空列表', e);
          sites = [];
        }
        await checkLoginStatus();
        renderSites();
      }

      init();
    })();
  </script>
</body>
</html>

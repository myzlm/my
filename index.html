<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>万壑松风 · 雅集</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src https://endorsed-mariah-said-bags.trycloudflare.com;">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" />
    <style>
        /* ==================== 基础变量与暗色模式 ==================== */
        :root {
            --bg: #f7f2e8;
            --bg-card: rgba(253, 250, 243, 0.6);
            --text: #2a2218;
            --text-light: #5c4f3a;
            --text-lighter: #8a7b65;
            --shadow: 0 2px 16px rgba(40,20,10,0.07);
            --shadow-hover: 0 6px 28px rgba(40,20,10,0.12);
            --border: rgba(140,120,90,0.35);
            --gold: #b8944b;
            --vermillion: #c43d3d;
            --vermillion-light: #d46565;
            --font-body: "Noto Serif SC", serif;
            --font-heading: "ZCOOL XiaoWei", "KaiTi", serif;
            --radius: 6px;
        }
        [data-theme="dark"] {
            --bg: #1a1815;
            --bg-card: rgba(40,38,35,0.7);
            --text: #e8e0d6;
            --text-light: #b8ae9e;
            --text-lighter: #8a7b65;
            --shadow: 0 2px 16px rgba(0,0,0,0.3);
            --shadow-hover: 0 6px 28px rgba(0,0,0,0.5);
            --border: rgba(100,90,80,0.4);
            --gold: #d4b66a;
            --vermillion: #b53535;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            color: var(--text);
            min-height:100vh;
            padding:20px;
            transition: background 0.3s, color 0.3s;
        }
        /* 古风背景图 */
        body {
            background-image: url('bg-pc.png');
            background-size: cover;
            background-position: center bottom;
            background-attachment: fixed;
            background-blend-mode: overlay;
        }
        @media (max-width:600px) {
            body { background-image: url('bg-mobile.png'); background-position: center center; }
        }

        /* ========== 登录卡片 ========== */
        .login-container {
            max-width: 400px;
            margin: 40px auto;
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 30px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .login-title {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            color: var(--text);
            letter-spacing: 0.12em;
        }
        .login-subtitle {
            font-size: 0.9rem;
            color: var(--text-lighter);
            margin-bottom: 28px;
            letter-spacing: 0.2em;
        }
        .input-group { margin-bottom:18px; text-align:left; }
        .input-group label {
            display:block; font-size:0.85rem;
            color:var(--text-light);
            margin-bottom:4px;
            font-family:var(--font-heading);
        }
        .input-group input {
            width:100%; padding:10px 14px;
            border:1px solid var(--border);
            background:rgba(255,255,255,0.3);
            border-radius:4px;
            font-family:var(--font-body);
            color:var(--text);
            transition:0.3s;
        }
        .input-group input:focus {
            outline:none; border-color:var(--gold);
            box-shadow:0 0 0 3px rgba(180,140,60,0.25);
        }
        .btn {
            width:100%; padding:12px;
            border:none; border-radius:4px;
            font-family:var(--font-heading);
            font-size:1.1rem;
            cursor:pointer; transition:0.3s;
            margin-top:8px;
        }
        .btn-login {
            background:var(--vermillion);
            color:#fef8f0;
            box-shadow:0 4px 12px rgba(180,40,30,0.3);
        }
        .btn-login:hover { background:#b53535; transform:translateY(-1px); }
        .btn-guest {
            background:rgba(255,255,255,0.2);
            color:var(--text-light);
            border:1px solid var(--border);
            backdrop-filter:blur(4px);
        }
        .btn-guest:hover { background:rgba(180,140,60,0.15); border-color:var(--gold); }
        .error-msg {
            color:var(--vermillion);
            font-size:0.8rem;
            min-height:20px;
            margin-top:6px;
        }

        /* ========== 主界面 ========== */
        .main-app { display: none; max-width: 1200px; margin:0 auto; padding:20px 10px; }
        .header {
            display:flex; justify-content:space-between; align-items:center;
            flex-wrap:wrap; gap:15px;
            margin-bottom:25px;
        }
        .header h1 {
            font-family:var(--font-heading);
            font-size:2rem;
            letter-spacing:0.1em;
            background: linear-gradient(180deg, #4a3525, #5c3d28);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 8px rgba(180,140,60,0.3);
        }
        .toolbar {
            display:flex; align-items:center; gap:12px;
            flex-wrap:wrap;
        }
        .role-badge {
            font-size:0.9rem;
            background:rgba(180,140,60,0.2);
            padding:4px 16px;
            border-radius:20px;
            color:var(--text-light);
            font-family:var(--font-heading);
            border:1px solid rgba(180,140,60,0.3);
        }
        .icon-btn {
            background:transparent; border:none;
            font-size:1.4rem; cursor:pointer;
            color:var(--text-light);
            transition:0.2s;
            padding:4px 8px;
            border-radius:4px;
        }
        .icon-btn:hover { background:rgba(180,140,60,0.15); }
        .btn-sm {
            background:rgba(250,245,235,0.5);
            border:1px solid var(--gold);
            color:var(--text);
            padding:6px 18px;
            border-radius:4px;
            cursor:pointer;
            font-family:var(--font-body);
            transition:0.2s;
            font-size:0.85rem;
        }
        .btn-sm:hover { background:rgba(180,140,60,0.2); }

        /* 搜索与分类栏 */
        .filter-bar {
            display:flex; flex-wrap:wrap; gap:12px;
            margin-bottom:25px;
            align-items:center;
            background:var(--bg-card);
            backdrop-filter:blur(4px);
            padding:12px 18px;
            border-radius:var(--radius);
            border:1px solid var(--border);
        }
        .filter-bar input {
            flex:1; min-width:150px;
            padding:8px 14px;
            border:1px solid var(--border);
            border-radius:4px;
            background:rgba(255,255,255,0.2);
            color:var(--text);
            font-family:var(--font-body);
        }
        .filter-bar input::placeholder { color:var(--text-lighter); }
        .category-tabs {
            display:flex; flex-wrap:wrap; gap:6px;
        }
        .category-tab {
            padding:4px 14px;
            border-radius:20px;
            border:1px solid var(--border);
            background:transparent;
            color:var(--text-light);
            cursor:pointer;
            font-size:0.8rem;
            transition:0.2s;
            font-family:var(--font-body);
        }
        .category-tab:hover, .category-tab.active {
            background:var(--gold);
            color:#fff;
            border-color:var(--gold);
        }

        /* 卡片网格 */
        .cards-grid {
            display:grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap:20px;
        }
        .card-link {
            display:flex; flex-direction:column;
            background:var(--bg-card);
            backdrop-filter:blur(8px);
            border:1px solid var(--border);
            border-radius:var(--radius);
            padding:18px 16px;
            text-decoration:none;
            color:var(--text);
            box-shadow:var(--shadow);
            transition:all 0.3s;
            position:relative;
            overflow:hidden;
        }
        .card-link:hover {
            transform:translateY(-5px);
            box-shadow:var(--shadow-hover);
            border-color:var(--gold);
        }
        .card-seal {
            width:44px; height:44px;
            background:var(--vermillion);
            color:#fef8f0;
            display:flex; align-items:center; justify-content:center;
            font-family:var(--font-heading);
            font-size:1.4rem;
            border-radius:3px;
            transform:rotate(-3deg);
            margin-bottom:12px;
            box-shadow:0 3px 8px rgba(180,40,30,0.35);
        }
        .card-content h3 {
            font-family:var(--font-heading);
            font-size:1.05rem;
            margin-bottom:4px;
        }
        .card-desc {
            font-size:0.78rem;
            color:var(--text-lighter);
            line-height:1.4;
        }
        .card-meta {
            margin-top:10px;
            display:flex; justify-content:space-between;
            font-size:0.7rem;
            color:var(--text-lighter);
            border-top:1px dashed var(--border);
            padding-top:8px;
        }
        .card-meta .category {
            background:rgba(180,140,60,0.15);
            padding:0 10px;
            border-radius:12px;
        }
        .card-meta .visits {
            opacity:0.7;
        }

        /* 管理员面板 */
        .admin-panel {
            margin-top:40px;
            background:var(--bg-card);
            backdrop-filter:blur(8px);
            border:1px solid var(--border);
            border-radius:var(--radius);
            padding:20px;
        }
        .admin-panel h3 {
            font-family:var(--font-heading);
            margin-bottom:18px;
            border-bottom:1px solid var(--border);
            padding-bottom:8px;
        }
        .admin-panel h4 {
            font-family:var(--font-heading);
            font-weight:normal;
            color:var(--text-light);
            margin-bottom:10px;
        }
        .list-item {
            display:flex; justify-content:space-between;
            align-items:center;
            padding:6px 4px;
            border-bottom:1px dashed var(--border);
            font-size:0.9rem;
        }
        .list-item button { font-size:0.8rem; padding:2px 12px; }
        .form-row {
            display:flex; gap:8px; flex-wrap:wrap;
            margin-bottom:10px;
        }
        .form-row input {
            flex:1; padding:6px 10px;
            border:1px solid var(--border);
            border-radius:4px;
            background:rgba(255,255,255,0.2);
            color:var(--text);
            min-width:80px;
        }
        .form-row button { padding:6px 16px; }

        @media (max-width:600px) {
            .cards-grid { grid-template-columns: 1fr; }
            .header h1 { font-size:1.4rem; }
            .filter-bar { flex-direction:column; align-items:stretch; }
        }
    </style>
</head>
<body>

<!-- 登录界面 -->
<div id="loginScreen" class="login-container">
    <div class="login-title">万壑松风</div>
    <div class="login-subtitle">· 雅集 · 登入</div>
    <form id="loginForm" onsubmit="return false;">
        <div class="input-group">
            <label>账号</label>
            <input type="text" id="usernameInput" placeholder="输入账号" autocomplete="username" />
        </div>
        <div class="input-group">
            <label>密码</label>
            <input type="password" id="passwordInput" placeholder="输入密码" autocomplete="current-password" />
        </div>
    </form>
    <div class="error-msg" id="loginError"></div>
    <button class="btn btn-login" id="loginBtn">登 录</button>
    <button class="btn btn-guest" id="guestBtn">游客模式 · 直接进入</button>
</div>

<!-- 主界面 -->
<div id="mainApp" class="main-app">
    <div class="header">
        <h1>万壑松风 · 雅集</h1>
        <div class="toolbar">
            <button class="icon-btn" id="themeToggle" title="切换暗色模式">🌙</button>
            <span class="role-badge" id="roleDisplay">👤 游客</span>
            <button class="btn-sm" id="logoutBtn">退出登录</button>
        </div>
    </div>

    <!-- 搜索与分类 -->
    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="搜索网站名称或描述..." />
        <div class="category-tabs" id="categoryTabs">
            <button class="category-tab active" data-category="all">全部</button>
        </div>
    </div>

    <!-- 卡片网格 -->
    <div id="cardsContainer" class="cards-grid"></div>

    <!-- 管理员面板 -->
    <div id="adminPanel" class="admin-panel" style="display:none;">
        <h3>⚙️ 管理员设置</h3>
        <div style="display:flex; gap:20px; flex-wrap:wrap;">
            <div style="flex:1; min-width:200px;">
                <h4>账号管理</h4>
                <form id="addUserForm" onsubmit="return false;">
                    <div class="form-row">
                        <input type="text" id="newUser" placeholder="新账号" autocomplete="username" />
                        <input type="password" id="newPass" placeholder="密码" autocomplete="new-password" />
                        <button class="btn-sm" id="addUserBtn">添加</button>
                    </div>
                </form>
                <div id="userList" style="max-height:150px; overflow-y:auto;"></div>
            </div>
            <div style="flex:1; min-width:250px;">
                <h4>网站列表管理</h4>
                <form id="addSiteForm" onsubmit="return false;">
                    <div class="form-row">
                        <input type="text" id="newSiteName" placeholder="名称" />
                        <input type="text" id="newSiteUrl" placeholder="网址" />
                    </div>
                    <div class="form-row">
                        <input type="text" id="newSiteDesc" placeholder="描述" />
                        <input type="text" id="newSiteSeal" placeholder="印章(1-2字)" maxlength="2" style="max-width:80px;" />
                        <input type="text" id="newSiteCategory" placeholder="分类" />
                        <button class="btn-sm" id="addSiteBtn">添加</button>
                    </div>
                </form>
                <div id="siteManageList" style="max-height:200px; overflow-y:auto;"></div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ===== 全局状态 =====
    const API_BASE = 'https://endorsed-mariah-said-bags.trycloudflare.com';
    let currentUser = null;
    let sitesData = [];
    let currentCategory = 'all';
    let searchKeyword = '';

    // DOM 引用
    const loginScreen = document.getElementById('loginScreen');
    const mainApp = document.getElementById('mainApp');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginError = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');
    const guestBtn = document.getElementById('guestBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const roleDisplay = document.getElementById('roleDisplay');
    const cardsContainer = document.getElementById('cardsContainer');
    const adminPanel = document.getElementById('adminPanel');
    const userListEl = document.getElementById('userList');
    const siteManageListEl = document.getElementById('siteManageList');
    const newUserInput = document.getElementById('newUser');
    const newPassInput = document.getElementById('newPass');
    const addUserBtn = document.getElementById('addUserBtn');
    const newSiteName = document.getElementById('newSiteName');
    const newSiteUrl = document.getElementById('newSiteUrl');
    const newSiteDesc = document.getElementById('newSiteDesc');
    const newSiteSeal = document.getElementById('newSiteSeal');
    const newSiteCategory = document.getElementById('newSiteCategory');
    const addSiteBtn = document.getElementById('addSiteBtn');
    const searchInput = document.getElementById('searchInput');
    const categoryTabs = document.getElementById('categoryTabs');
    const themeToggle = document.getElementById('themeToggle');

    // ===== API 请求（使用 Cookie，不手动设置 Authorization） =====
    async function apiRequest(endpoint, options = {}) {
        const headers = { 'Content-Type': 'application/json' };
        // 不再需要手动添加 Authorization 头，因为 cookie 会自动发送
        const res = await fetch(`${API_BASE}${endpoint}`, {
            ...options,
            headers: { ...headers, ...options.headers },
            credentials: 'include'  // 重要：发送 cookie
        });
        const data = await res.json();
        if (!res.ok) {
            throw new Error(data.error || '请求失败');
        }
        return data;
    }

    // ===== 界面切换 =====
    function showLogin() {
        loginScreen.style.display = 'block';
        mainApp.style.display = 'none';
    }
    function showApp() {
        loginScreen.style.display = 'none';
        mainApp.style.display = 'block';
        renderAll();
    }

    // ===== 登录 / 登出 =====
    loginBtn.addEventListener('click', async () => {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        if (!username || !password) {
            loginError.textContent = '请输入账号和密码';
            return;
        }
        try {
            const res = await apiRequest('/api/login', {
                method: 'POST',
                body: JSON.stringify({ username, password })
            });
            // 登录成功，后端已设置 cookie
            loginError.textContent = '';
            // 获取当前用户信息（可选）
            await fetchUserInfo();
            showApp();
        } catch (err) {
            loginError.textContent = err.message;
        }
    });

    guestBtn.addEventListener('click', () => {
        // 游客模式，不登录，直接进入
        currentUser = { username: '游客', role: 'guest' };
        showApp();
    });

    logoutBtn.addEventListener('click', async () => {
        try {
            await apiRequest('/api/logout', { method: 'POST' });
        } catch (e) { /* ignore */ }
        currentUser = null;
        showLogin();
    });

    // 获取当前用户信息（验证登录状态）
    async function fetchUserInfo() {
        try {
            const res = await apiRequest('/api/me');
            currentUser = { username: res.username, role: res.role };
        } catch (e) {
            currentUser = { username: '游客', role: 'guest' };
        }
    }

    // ===== 数据加载与渲染 =====
    async function loadSites() {
        try {
            const sites = await apiRequest('/api/sites');
            sitesData = sites;
            return sites;
        } catch (err) {
            console.error('加载网站失败', err);
            return [];
        }
    }

    function getCategories(sites) {
        const cats = new Set(sites.map(s => s.category || '其他'));
        return ['全部', ...Array.from(cats)];
    }

    function renderCategoryTabs(categories) {
        const container = categoryTabs;
        container.innerHTML = '';
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'category-tab' + (cat === currentCategory ? ' active' : '');
            btn.dataset.category = cat;
            btn.textContent = cat;
            btn.addEventListener('click', () => {
                currentCategory = cat;
                renderCategoryTabs(getCategories(sitesData));
                renderCards();
            });
            container.appendChild(btn);
        });
    }

    function renderCards() {
        const filtered = sitesData.filter(site => {
            const matchCategory = currentCategory === '全部' || site.category === currentCategory;
            const keyword = searchKeyword.toLowerCase().trim();
            const matchSearch = !keyword || 
                site.name.toLowerCase().includes(keyword) || 
                (site.desc && site.desc.toLowerCase().includes(keyword));
            return matchCategory && matchSearch;
        });
        cardsContainer.innerHTML = '';
        if (filtered.length === 0) {
            cardsContainer.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-lighter);">没有找到匹配的网站</p>';
            return;
        }
        filtered.forEach((site, idx) => {
            const a = document.createElement('a');
            a.className = 'card-link';
            a.href = site.url || '#';
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.dataset.index = sitesData.indexOf(site); // 原始索引

            const seal = document.createElement('div');
            seal.className = 'card-seal';
            seal.textContent = site.seal || '🔗';

            const content = document.createElement('div');
            content.className = 'card-content';
            const h3 = document.createElement('h3');
            h3.textContent = site.name || '未命名';
            const desc = document.createElement('div');
            desc.className = 'card-desc';
            desc.textContent = site.desc || '';
            content.appendChild(h3);
            content.appendChild(desc);

            const meta = document.createElement('div');
            meta.className = 'card-meta';
            const catSpan = document.createElement('span');
            catSpan.className = 'category';
            catSpan.textContent = site.category || '其他';
            const visitsSpan = document.createElement('span');
            visitsSpan.className = 'visits';
            visitsSpan.textContent = `👁 ${site.visits || 0}`;
            meta.appendChild(catSpan);
            meta.appendChild(visitsSpan);

            a.appendChild(seal);
            a.appendChild(content);
            a.appendChild(meta);

            // 点击卡片时增加访问数（不跳转前先记录）
            a.addEventListener('click', (e) => {
                // 允许正常跳转，但先记录访问
                const idx = parseInt(a.dataset.index);
                if (!isNaN(idx) && idx >= 0 && idx < sitesData.length) {
                    apiRequest(`/api/sites/${idx}/visit`, { method: 'POST' })
                        .then(() => {
                            // 更新本地数据
                            sitesData[idx].visits = (sitesData[idx].visits || 0) + 1;
                            // 不重新渲染所有，只更新当前卡片上的访问数
                            const visitsEl = a.querySelector('.visits');
                            if (visitsEl) visitsEl.textContent = `👁 ${sitesData[idx].visits}`;
                        })
                        .catch(e => console.warn('更新访问数失败', e));
                }
                // 让链接正常跳转
            });

            cardsContainer.appendChild(a);
        });
    }

    function renderUserList(users) {
        userListEl.innerHTML = '';
        users.forEach(user => {
            const div = document.createElement('div');
            div.className = 'list-item';
            const span = document.createElement('span');
            span.textContent = user.username + (user.username === 'zlm' ? ' (管理员)' : '');
            div.appendChild(span);
            if (user.username !== 'zlm') {
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-sm';
                delBtn.textContent = '删除';
                delBtn.addEventListener('click', async () => {
                    if (!confirm(`确定删除 ${user.username} 吗？`)) return;
                    try {
                        await apiRequest(`/api/users/${user.username}`, { method: 'DELETE' });
                        const updated = await apiRequest('/api/users');
                        renderUserList(updated);
                    } catch (e) { alert(e.message); }
                });
                div.appendChild(delBtn);
            }
            userListEl.appendChild(div);
        });
    }

    function renderSiteManageList(sites) {
        siteManageListEl.innerHTML = '';
        sites.forEach((site, idx) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            const span = document.createElement('span');
            span.textContent = `${site.name} (${site.url})`;
            div.appendChild(span);
            const delBtn = document.createElement('button');
            delBtn.className = 'btn-sm';
            delBtn.textContent = '删除';
            delBtn.addEventListener('click', async () => {
                if (!confirm(`确定删除 ${site.name} 吗？`)) return;
                try {
                    await apiRequest(`/api/sites/${idx}`, { method: 'DELETE' });
                    const updated = await apiRequest('/api/sites');
                    sitesData = updated;
                    renderAll();
                } catch (e) { alert(e.message); }
            });
            div.appendChild(delBtn);
            siteManageListEl.appendChild(div);
        });
    }

    async function renderAll() {
        if (!currentUser) {
            showLogin();
            return;
        }
        roleDisplay.textContent = currentUser.role === 'admin' ? '🔑 管理员' : '👤 游客';
        adminPanel.style.display = currentUser.role === 'admin' ? 'block' : 'none';

        // 加载数据
        await loadSites();
        // 渲染分类
        const cats = getCategories(sitesData);
        renderCategoryTabs(cats);
        // 渲染卡片
        renderCards();

        if (currentUser.role === 'admin') {
            try {
                const users = await apiRequest('/api/users');
                renderUserList(users);
            } catch (e) {}
            renderSiteManageList(sitesData);
        }
    }

    // ===== 搜索 =====
    searchInput.addEventListener('input', (e) => {
        searchKeyword = e.target.value;
        renderCards();
    });

    // ===== 暗色模式 =====
    const storedTheme = localStorage.getItem('theme') || 'light';
    if (storedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeToggle.textContent = '☀️';
    }
    themeToggle.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            themeToggle.textContent = '🌙';
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            themeToggle.textContent = '☀️';
        }
    });

    // ===== 管理员操作 =====
    addUserBtn.addEventListener('click', async () => {
        const username = newUserInput.value.trim();
        const password = newPassInput.value;
        if (!username || !password) return alert('账号密码不能为空');
        try {
            await apiRequest('/api/users', {
                method: 'POST',
                body: JSON.stringify({ username, password })
            });
            alert('添加成功');
            newUserInput.value = '';
            newPassInput.value = '';
            const users = await apiRequest('/api/users');
            renderUserList(users);
        } catch (e) { alert(e.message); }
    });

    addSiteBtn.addEventListener('click', async () => {
        const name = newSiteName.value.trim();
        const url = newSiteUrl.value.trim();
        const desc = newSiteDesc.value.trim();
        const seal = newSiteSeal.value.trim();
        const category = newSiteCategory.value.trim() || '其他';
        if (!name || !url) return alert('名称和网址必填');
        try {
            await apiRequest('/api/sites', {
                method: 'POST',
                body: JSON.stringify({ name, url, desc, seal, category })
            });
            alert('添加成功');
            ['newSiteName','newSiteUrl','newSiteDesc','newSiteSeal','newSiteCategory'].forEach(id => document.getElementById(id).value = '');
            await loadSites();
            renderAll();
        } catch (e) { alert(e.message); }
    });

    // ===== 启动 =====
    window.addEventListener('load', async () => {
        // 先尝试自动登录
        await fetchUserInfo();
        if (currentUser && currentUser.username !== '游客') {
            showApp();
        } else {
            showLogin();
        }
    });

})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万壑松风 · 雅集</title>
    <style>
        :root {
            --paper: #f7f2e8;
            --paper-light: #fdfaf3;
            --paper-dark: #e8e0d0;
            --ink: #2a2218;
            --ink-light: #5c4f3a;
            --ink-lighter: #8a7b65;
            --vermillion: #c43d3d;
            --vermillion-dark: #a83232;
            --vermillion-light: #d46565;
            --gold: #b8944b;
            --gold-light: #d4b66a;
            --gold-dark: #8b6d32;
            --jade: #6b8e7a;
            --jade-light: #8aab99;
            --cloud: rgba(180, 160, 140, 0.25);
            --shadow-soft: 0 2px 16px rgba(40, 20, 10, 0.07);
            --shadow-medium: 0 6px 28px rgba(40, 20, 10, 0.12);
            --shadow-gold: 0 4px 20px rgba(180, 140, 60, 0.2);
            --border-subtle: 1px solid rgba(140, 120, 90, 0.3);
            --border-gold: 1px solid rgba(180, 140, 70, 0.5);
            --radius-card: 6px;
            --radius-seal: 3px;
            --transition-ease: 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --font-body: "Noto Serif SC", "Songti SC", "STSong", "华文宋体", "SimSun", "宋体", "Georgia", "Times New Roman", serif;
            --font-heading: "ZCOOL XiaoWei", "KaiTi", "STKaiti", "华文楷体", "楷体", "KaiTi", serif;
            --font-seal: "ZCOOL XiaoWei", "KaiTi", "STKaiti", "华文楷体", "楷体", serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* 宣纸纹理 */
            background-image:
                radial-gradient(ellipse at 18% 35%, rgba(180, 150, 120, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 20%, rgba(160, 130, 100, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 55% 70%, rgba(170, 145, 115, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 30% 80%, rgba(175, 150, 125, 0.05) 0%, transparent 45%),
                /* 细微纤维纹理 */
                repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(180, 160, 135, 0.015) 2px,
                    rgba(180, 160, 135, 0.015) 3px),
                repeating-linear-gradient(90deg,
                    transparent,
                    transparent 3px,
                    rgba(175, 155, 130, 0.01) 3px,
                    rgba(175, 155, 130, 0.01) 4px);
            background-attachment: fixed;
        }

        /* ========== 水墨远山背景 ========== */
        body::before {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 55%;
            pointer-events: none;
            z-index: 0;
            background:
                /* 远山层1 - 最淡最远 */
                radial-gradient(ellipse 140% 280px at 25% 95%, rgba(100, 85, 65, 0.07) 0%, transparent 65%),
                /* 远山层2 */
                radial-gradient(ellipse 110% 220px at 60% 90%, rgba(90, 75, 58, 0.08) 0%, transparent 60%),
                /* 远山层3 - 较近较深 */
                radial-gradient(ellipse 90% 160px at 42% 88%, rgba(80, 65, 48, 0.1) 0%, transparent 58%),
                /* 近山层 */
                radial-gradient(ellipse 70% 100px at 55% 92%, rgba(70, 55, 40, 0.11) 0%, transparent 55%),
                /* 最淡补充 */
                radial-gradient(ellipse 160% 350px at 78% 96%, rgba(105, 88, 68, 0.05) 0%, transparent 68%);
            opacity: 0.85;
        }

        /* 云雾缭绕 */
        body::after {
            content: '';
            position: fixed;
            bottom: 5%;
            left: 0;
            width: 100%;
            height: 30%;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse 200% 120px at 30% 40%, rgba(240, 230, 210, 0.5) 0%, transparent 60%),
                radial-gradient(ellipse 180% 100px at 65% 50%, rgba(245, 235, 218, 0.45) 0%, transparent 55%),
                radial-gradient(ellipse 150% 80px at 50% 35%, rgba(238, 225, 205, 0.4) 0%, transparent 50%);
        }

        /* ========== 主容器 ========== */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 30px 24px 50px;
        }

        /* ========== 顶部匾额区域 ========== */
        .header-wrapper {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        /* 匾额装饰云纹 */
        .header-wrapper::before,
        .header-wrapper::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            pointer-events: none;
            opacity: 0.5;
            z-index: 0;
            background:
                radial-gradient(circle at 50% 40%, rgba(180, 150, 110, 0.4) 0%, transparent 70%);
            border-radius: 50%;
        }
        .header-wrapper::before {
            left: 2%;
            background:
                radial-gradient(circle at 45% 45%, rgba(190, 155, 115, 0.35) 0%, transparent 65%),
                radial-gradient(circle at 55% 40%, rgba(175, 140, 100, 0.3) 0%, transparent 60%);
        }
        .header-wrapper::after {
            right: 2%;
            background:
                radial-gradient(circle at 55% 45%, rgba(190, 155, 115, 0.35) 0%, transparent 65%),
                radial-gradient(circle at 45% 40%, rgba(175, 140, 100, 0.3) 0%, transparent 60%);
        }

        .plaque {
            display: inline-block;
            position: relative;
            z-index: 1;
            background: linear-gradient(180deg,
                    #4a3525 0%, #3d2a1a 8%, #5c3d28 15%, #4a3020 30%,
                    #3d2518 50%, #4a3020 70%, #5c3d28 85%, #3d2a1a 92%, #4a3525 100%);
            padding: 18px 50px;
            border: 3px solid #6b4d30;
            outline: 2px solid #8b6d4a;
            outline-offset: -8px;
            box-shadow:
                inset 0 2px 4px rgba(255, 220, 160, 0.15),
                inset 0 -2px 4px rgba(0, 0, 0, 0.3),
                0 6px 24px rgba(30, 15, 5, 0.4),
                0 2px 0 #7a5a3a,
                0 4px 0 #5a3d25,
                0 6px 0 #3d2518;
            border-radius: 4px;
            position: relative;
        }

        /* 匾额金色内框装饰线 */
        .plaque::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 16px;
            right: 16px;
            bottom: 10px;
            border: 1px solid rgba(200, 160, 90, 0.5);
            border-radius: 2px;
            pointer-events: none;
        }

        /* 匾额角花 */
        .plaque::after {
            content: '❖';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8px;
            color: rgba(200, 160, 90, 0.3);
            pointer-events: none;
            letter-spacing: 80px;
            white-space: nowrap;
            text-indent: -20px;
        }

        .plaque-title {
            font-family: var(--font-heading);
            font-size: 2.4rem;
            font-weight: 700;
            color: #e8d5a3;
            text-shadow:
                0 1px 2px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(220, 180, 100, 0.4),
                0 0 40px rgba(200, 150, 70, 0.25);
            letter-spacing: 0.15em;
            position: relative;
            z-index: 1;
            line-height: 1.3;
        }

        .plaque-subtitle {
            font-family: var(--font-seal);
            font-size: 0.85rem;
            color: #c4a870;
            letter-spacing: 0.25em;
            margin-top: 2px;
            position: relative;
            z-index: 1;
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.4);
        }

        /* 匾额悬挂装饰 */
        .plaque-hangers {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: -2px;
            position: relative;
            z-index: 2;
        }
        .plaque-hanger {
            width: 2px;
            height: 20px;
            background: linear-gradient(180deg, #8b6d4a, #c4a870, #8b6d4a);
            border-radius: 1px;
            position: relative;
        }
        .plaque-hanger::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #c4a870 0%, #8b6d4a 70%);
            border-radius: 50%;
        }

        /* ========== 引言/描述区域 ========== */
        .intro-section {
            text-align: center;
            margin-bottom: 36px;
            position: relative;
            z-index: 1;
        }

        .intro-text {
            display: inline-block;
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--ink-lighter);
            letter-spacing: 0.08em;
            line-height: 2;
            position: relative;
            padding: 10px 30px;
        }

        /* 引言两侧装饰线 */
        .intro-text::before,
        .intro-text::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(160, 130, 90, 0.5), transparent);
        }
        .intro-text::before {
            left: -30px;
        }
        .intro-text::after {
            right: -30px;
        }

        /* ========== 网站链接卡片网格 ========== */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
            position: relative;
            z-index: 1;
            margin-bottom: 30px;
        }

        /* ========== 单张卡片 ========== */
        .card-link {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--paper-light);
            border: var(--border-subtle);
            border-radius: var(--radius-card);
            padding: 18px 16px;
            text-decoration: none;
            color: var(--ink);
            position: relative;
            transition: all var(--transition-ease);
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            /* 卡片纸纹理 */
            background-image:
                linear-gradient(180deg,
                    rgba(255, 252, 245, 0.5) 0%,
                    transparent 30%,
                    transparent 70%,
                    rgba(235, 225, 210, 0.3) 100%);
            overflow: hidden;
        }

        /* 卡片左侧朱砂竖线 */
        .card-link::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 3px;
            background: linear-gradient(180deg,
                    var(--vermillion-light) 0%,
                    var(--vermillion) 30%,
                    var(--vermillion-dark) 70%,
                    var(--vermillion-light) 100%);
            border-radius: 0 2px 2px 0;
            transition: all var(--transition-ease);
            opacity: 0.7;
        }

        /* 卡片底部金色细线 */
        .card-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 16px;
            right: 16px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(180, 140, 70, 0.35), transparent);
            transition: all var(--transition-ease);
        }

        .card-link:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-medium), var(--shadow-gold);
            border-color: rgba(180, 140, 70, 0.55);
            background-color: #fffdf7;
        }
        .card-link:hover::before {
            opacity: 1;
            box-shadow: 0 0 10px rgba(196, 61, 61, 0.3);
        }
        .card-link:hover::after {
            background: linear-gradient(90deg, transparent, rgba(200, 155, 75, 0.7), transparent);
        }
        .card-link:active {
            transform: translateY(-2px);
            transition: all 0.1s ease;
        }
        .card-link:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 3px;
            border-radius: var(--radius-card);
        }

        /* ========== 印章图标 ========== */
        .card-seal {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            background: var(--vermillion);
            color: #fef8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-seal);
            font-size: 1.5rem;
            font-weight: 700;
            border-radius: var(--radius-seal);
            transform: rotate(-3deg);
            box-shadow:
                inset 0 1px 3px rgba(255, 180, 150, 0.3),
                inset 0 -1px 3px rgba(0, 0, 0, 0.25),
                0 3px 8px rgba(180, 40, 30, 0.3);
            transition: all var(--transition-ease);
            letter-spacing: 0;
            line-height: 1;
            position: relative;
            z-index: 1;
        }
        /* 印章内部纹理 */
        .card-seal::after {
            content: '';
            position: absolute;
            inset: 3px;
            border: 1px solid rgba(255, 220, 200, 0.4);
            border-radius: 1px;
            pointer-events: none;
        }

        .card-link:hover .card-seal {
            transform: rotate(-1deg) scale(1.06);
            box-shadow:
                inset 0 1px 3px rgba(255, 180, 150, 0.35),
                inset 0 -1px 3px rgba(0, 0, 0, 0.25),
                0 6px 16px rgba(180, 40, 30, 0.4);
        }

        /* ========== 卡片文字内容 ========== */
        .card-content {
            flex: 1;
            min-width: 0;
            position: relative;
            z-index: 1;
        }
        .card-content h3 {
            font-family: var(--font-heading);
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--ink);
            letter-spacing: 0.05em;
            margin-bottom: 3px;
            transition: color var(--transition-ease);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-link:hover .card-content h3 {
            color: #1a1008;
        }
        .card-content .card-desc {
            font-size: 0.8rem;
            color: var(--ink-lighter);
            letter-spacing: 0.03em;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: color var(--transition-ease);
        }
        .card-link:hover .card-content .card-desc {
            color: var(--ink-light);
        }

        /* ========== 箭头指示 ========== */
        .card-arrow {
            flex-shrink: 0;
            font-size: 1.1rem;
            color: rgba(160, 130, 90, 0.5);
            transition: all var(--transition-ease);
            font-family: serif;
            position: relative;
            z-index: 1;
        }
        .card-link:hover .card-arrow {
            color: var(--gold);
            transform: translateX(4px);
        }

        /* ========== 底部印章区域 ========== */
        .footer-section {
            text-align: center;
            position: relative;
            z-index: 1;
            margin-top: 10px;
            padding-top: 20px;
        }

        .footer-seal-group {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .footer-seal {
            width: 62px;
            height: 62px;
            background: var(--vermillion);
            color: #fef8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-seal);
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: var(--radius-seal);
            transform: rotate(2deg);
            letter-spacing: 0.1em;
            box-shadow:
                inset 0 1px 3px rgba(255, 180, 150, 0.3),
                inset 0 -1px 3px rgba(0, 0, 0, 0.3),
                0 4px 12px rgba(160, 35, 25, 0.35);
            position: relative;
            writing-mode: horizontal-tb;
        }
        .footer-seal::after {
            content: '';
            position: absolute;
            inset: 3px;
            border: 1px solid rgba(255, 220, 200, 0.4);
            border-radius: 1px;
            pointer-events: none;
        }
        .footer-credit {
            font-size: 0.75rem;
            color: var(--ink-lighter);
            letter-spacing: 0.08em;
            font-family: var(--font-body);
        }

        /* ========== 飘落花瓣 ========== */
        .petals-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .petal {
            position: absolute;
            top: -40px;
            background: radial-gradient(ellipse at 35% 30%,
                    rgba(235, 175, 160, 0.7) 0%,
                    rgba(220, 145, 130, 0.55) 35%,
                    rgba(200, 120, 105, 0.3) 65%,
                    transparent 100%);
            border-radius: 45% 55% 50% 50%;
            animation: petalFall linear infinite;
            opacity: 0;
        }
        @keyframes petalFall {
            0% {
                transform: translateY(-60px) translateX(0) rotate(0deg) scale(0.6);
                opacity: 0;
            }
            4% {
                opacity: 0.75;
            }
            12% {
                transform: translateY(12vh) translateX(25px) rotate(55deg) scale(0.85);
                opacity: 0.7;
            }
            25% {
                transform: translateY(25vh) translateX(-18px) rotate(120deg) scale(0.95);
                opacity: 0.6;
            }
            40% {
                transform: translateY(40vh) translateX(35px) rotate(190deg) scale(0.8);
                opacity: 0.55;
            }
            55% {
                transform: translateY(55vh) translateX(-28px) rotate(260deg) scale(0.9);
                opacity: 0.5;
            }
            70% {
                transform: translateY(70vh) translateX(20px) rotate(330deg) scale(0.75);
                opacity: 0.4;
            }
            85% {
                transform: translateY(85vh) translateX(-15px) rotate(400deg) scale(0.55);
                opacity: 0.2;
            }
            96% {
                opacity: 0.05;
            }
            100% {
                transform: translateY(105vh) translateX(8px) rotate(480deg) scale(0.3);
                opacity: 0;
            }
        }

        /* ========== 响应式设计 ========== */
        @media (max-width: 900px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            .plaque {
                padding: 16px 32px;
            }
            .plaque-title {
                font-size: 1.8rem;
            }
            .plaque-subtitle {
                font-size: 0.72rem;
            }
            .plaque::after {
                letter-spacing: 50px;
                font-size: 6px;
            }
            .card-link {
                padding: 14px 12px;
                gap: 12px;
            }
            .card-seal {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
            .card-content h3 {
                font-size: 0.95rem;
            }
            .card-content .card-desc {
                font-size: 0.72rem;
            }
            .header-wrapper::before,
            .header-wrapper::after {
                width: 35px;
                height: 35px;
                opacity: 0.35;
            }
        }

        @media (max-width: 560px) {
            .cards-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            .main-container {
                padding: 20px 14px 40px;
            }
            .plaque {
                padding: 14px 22px;
                border-width: 2px;
                outline-offset: -5px;
                outline-width: 1.5px;
            }
            .plaque-title {
                font-size: 1.5rem;
                letter-spacing: 0.1em;
            }
            .plaque-subtitle {
                font-size: 0.65rem;
                letter-spacing: 0.18em;
            }
            .plaque::after {
                letter-spacing: 30px;
                font-size: 5px;
            }
            .plaque::before {
                top: 6px;
                left: 10px;
                right: 10px;
                bottom: 6px;
            }
            .card-link {
                padding: 14px 14px;
                gap: 12px;
            }
            .card-seal {
                width: 38px;
                height: 38px;
                font-size: 1.1rem;
            }
            .card-content h3 {
                font-size: 0.9rem;
            }
            .card-content .card-desc {
                font-size: 0.7rem;
            }
            .card-arrow {
                font-size: 0.95rem;
            }
            .intro-text {
                font-size: 0.85rem;
                padding: 8px 16px;
            }
            .intro-text::before,
            .intro-text::after {
                width: 20px;
            }
            .intro-text::before {
                left: -12px;
            }
            .intro-text::after {
                right: -12px;
            }
            .header-wrapper::before,
            .header-wrapper::after {
                display: none;
            }
            .plaque-hangers {
                gap: 24px;
            }
            .plaque-hanger {
                height: 14px;
                width: 1.5px;
            }
            .footer-seal {
                width: 50px;
                height: 50px;
                font-size: 0.9rem;
            }
            /* 移动端减少花瓣 */
            .petal:nth-child(n+7) {
                display: none;
            }
        }

        @media (max-width: 380px) {
            .plaque {
                padding: 10px 14px;
            }
            .plaque-title {
                font-size: 1.25rem;
            }
            .plaque-subtitle {
                font-size: 0.58rem;
            }
            .card-link {
                padding: 12px 10px;
                gap: 10px;
            }
            .card-seal {
                width: 34px;
                height: 34px;
                font-size: 1rem;
            }
            .card-content h3 {
                font-size: 0.82rem;
            }
            .card-content .card-desc {
                font-size: 0.66rem;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== 飘落花瓣容器 ==================== -->
    <div class="petals-container" aria-hidden="true">
        <span class="petal" style="left:5%;width:14px;height:18px;animation-duration:7.2s;animation-delay:0s;"></span>
        <span class="petal" style="left:12%;width:11px;height:15px;animation-duration:8.5s;animation-delay:1.2s;"></span>
        <span class="petal" style="left:22%;width:16px;height:20px;animation-duration:6.8s;animation-delay:3s;"></span>
        <span class="petal" style="left:30%;width:10px;height:13px;animation-duration:9s;animation-delay:0.6s;"></span>

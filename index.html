<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>墨韵·书签雅集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-pc: url('bg-pc.png');
      --bg-mobile: url('bg-mobile.png');
      --ink: #2c2c2c;
      --red-seal: #c53b3b;
      --gold: #b89b5a;
      --shadow-soft: 0 8px 20px rgba(0, 0, 0, 0.15);
      --transition: 0.3s ease;
    }
    body {
      font-family: 'ZCOOL XiaoWei', 'Ma Shan Zheng', 'KaiTi', '楷体', serif;
      min-height: 100vh;
      background-color: #e8dcc8;
      background-image: var(--bg-pc);
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0.5rem 1rem;
      position: relative;
      overflow-x: hidden;
      color: var(--ink);
    }
    @media (max-width: 768px) {
      body {
        background-image: var(--bg-mobile);
        padding: 0.5rem 0.5rem;
      }
    }
    .clouds { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .cloud { position: absolute; background: rgba(255,255,255,0.7); border-radius: 50%; filter: blur(18px); opacity: 0.5; animation: floatCloud linear infinite; }
    .cloud::after, .cloud::before { content: ''; position: absolute; background: inherit; border-radius: 50%; }
    .cloud::before { width: 70%; height: 70%; top: -35%; left: 15%; }
    .cloud::after { width: 50%; height: 50%; top: -25%; right: 10%; }
    @keyframes floatCloud { 0% { transform: translateX(-120%); } 100% { transform: translateX(120vw); } }
    #petalCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    #rippleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1.5; }

    .main-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1200px;
      background: transparent;
      backdrop-filter: none;
      border-radius: 0;
 box-shadow: none;
      padding: 1rem 0.5rem 2rem;
      border: none;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      padding-bottom: 0.8rem;
      border-bottom: 2px dashed rgba(180,150,100,0.5);
    }
    .user-area {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.3rem;
    }
    .greeting {
      font-size: 1.1rem;
      color: #3e2e1f;
      text-shadow: 1px 1px 2px rgba(255,255,240,0.8);
      background: rgba(255,250,240,0.5);
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
    }
    .btn {
      background: rgba(255, 250, 240, 0.6);
      backdrop-filter: blur(6px);
      border: 1px solid #9e8b6b;
      color: #3e2e1f;
      padding: 0.5rem 1.2rem;
      border-radius: 30px;
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
      transition: all var(--transition);
      letter-spacing: 1px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .btn:hover {
      background: rgba(197, 164, 107, 0.8);
      color: #fff;
      border-color: #c5a46b;
      box-shadow: 0 4px 12px rgba(180,140,80,0.3);
    }
    .btn.admin-btn {
      border-color: #b88a4b;
      color: #5a3e2b;
      font-weight: bold;
      background: rgba(245, 235, 210, 0.7);
    }

    .plaque-wrapper {
      display: flex;
      justify-content: center;
      width: 100%;
      margin-top: 0;
    }
    .plaque {
      position: relative;
      background: repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 5px),
                  repeating-linear-gradient(180deg, rgba(255,220,160,0.03) 0px, rgba(255,220,160,0.03) 1px, transparent 1px, transparent 3px),
                  linear-gradient(180deg, #5c3822 0%, #3d1f08 30%, #4a2610 60%, #2f1505 100%);
      border-radius: 8px;
      padding: 0.8rem 2.5rem;
      border: 4px solid #3a1f0a;
      box-shadow: 0 8px 25px rgba(0,0,0,0.5), 0 2px 6px rgba(0,0,0,0.3),
                  inset 0 0 0 3px #8b6914, inset 0 0 0 7px #3d1f08,
                  inset 0 0 0 9px #c4a44a, inset 0 0 0 12px #2a1405;
      text-align: center;
      transition: transform 0.3s ease;
      margin-bottom: 0.5rem;
    }
    @media (max-width: 768px) {
      .plaque {
        padding: 0.6rem 1.2rem;
        border-width: 3px;
      }
      .plaque-title {
        font-size: clamp(1.8rem, 6vw, 2.4rem);
        letter-spacing: 4px;
      }
    }
    .plaque::before {
      content: '';
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 30px;
      background:
        radial-gradient(circle 8px, #b8944b 40%, #6b4f10 60%, transparent 65%) 10px 8px,
        radial-gradient(circle 8px, #b8944b 40%, #6b4f10 60%, transparent 65%) 40px 8px;
      background-repeat: no-repeat;
      z-index: 1;
      pointer-events: none;
    }
    .plaque::after {
      content: '';
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      background:
        radial-gradient(circle 7px, #c49a4b 35%, #7a5c2a 55%, transparent 60%) 0px 0px,
        radial-gradient(circle 7px, #c49a4b 35%, #7a5c2a 55%, transparent 60%) 100% 0px,
        radial-gradient(circle 7px, #c49a4b 35%, #7a5c2a 55%, transparent 60%) 0px 100%,
        radial-gradient(circle 7px, #c49a4b 35%, #7a5c2a 55%, transparent 60%) 100% 100%;
      background-repeat: no-repeat;
      z-index: 2;
      opacity: 0.8;
      pointer-events: none;
    }
    .plaque .shine {
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,240,0.08), rgba(255,255,240,0.15), rgba(255,255,240,0.08), transparent);
      animation: plaqueShine 5s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
      border-radius: 4px;
    }
    @keyframes plaqueShine { 0% { left: -60%; } 60% { left: 110%; } 100% { left: 110%; } }
    .plaque-title {
      font-family: 'ZCOOL QingKe HuangYou', 'Ma Shan Zheng', 'STXingkai', '华文行楷', 'KaiTi', '楷体', serif;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: normal;
      color: #e8d5a3;
      letter-spacing: 8px;
      text-shadow:
        1px 0 0 rgba(0,0,0,0.7), -1px 0 0 rgba(0,0,0,0.4),
        0 1px 0 rgba(0,0,0,0.6), 0 -1px 0 rgba(0,0,0,0.3),
        2px 2px 3px rgba(0,0,0,0.6), -1px -1px 1px rgba(255,240,200,0.25),
        0 0 12px rgba(200,160,60,0.5), 0 0 30px rgba(180,130,40,0.35),
        0 4px 8px rgba(0,0,0,0.55);
      position: relative;
 z-index: 1;
      white-space: nowrap;
      line-height: 1.3;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.6));
    }

    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-top: 0.5rem;
    }
    .site-card {
      background: rgba(255, 255, 250, 0.25);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(180, 150, 100, 0.4);
      border-radius: 20px;
      padding: 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all var(--transition);
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      text-decoration: none;
      color: inherit;
    }
    .site-card:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 250, 0.45);
      border-color: #b89b5a;
      box-shadow: 0 12px 24px rgba(0,0,0,0.15);
    }
    .seal {
      width: 50px;
      height: 50px;
      min-width: 50px;
      background: #c53b3b;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-family: 'Ma Shan Zheng', cursive;
      box-shadow: 0 2px 8px rgba(180,60,60,0.4);
      text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
    }
    .site-info { flex: 1; min-width: 0; }
    .site-name {
      font-size: 1.3rem;
      font-weight: bold;
      color: #2e2210;
      text-shadow: 0 1px 2px rgba(255,255,240,0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .site-desc {
      font-size: 0.9rem;
      color: #4a3828;
      text-shadow: 0 1px 2px rgba(255,255,240,0.7);
      margin-top: 0.2rem;
    }
    .site-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #5e4e3a;
      margin-top: 0.4rem;
    }
    .site-category {
      background: rgba(231, 220, 200, 0.8);
      padding: 0.1rem 0.6rem;
      border-radius: 20px;
      backdrop-filter: blur(4px);
    }

    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
      display: flex; justify-content: center; align-items: center;
      z-index: 100; visibility: hidden; opacity: 0;
      transition: opacity 0.3s ease, visibility 0.3s;
    }
    .modal-overlay.active { visibility: visible; opacity: 1; }
    .modal {
      background: #fdf8f0; border-radius: 32px; padding: 2rem;
      width: 90%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      border: 1px solid #c5a46b; position: relative;
    }
    .modal h2 { text-align: center; font-family: 'Ma Shan Zheng', cursive; font-size: 2rem; margin-bottom: 1.5rem; color: #4a3828; }
    .input-group { margin-bottom: 1.2rem; }
    .input-group label { display: block; margin-bottom: 0.3rem; color: #5a4a32; }
    .input-group input {
      width: 100%; padding: 0.7rem 1rem; border: 1px solid #cfbfa0;
      border-radius: 30px; background: rgba(255,255,250,0.8);
      font-family: inherit; font-size: 1rem; outline: none;
    }
    .modal-actions { display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem; }
    .close-btn { position: absolute; top: 10px; right: 20px; background: none; border: none; font-size: 1.8rem; cursor: pointer; color: #8b7a62; }

    .admin-panel {
      background: rgba(245,240,230,0.75);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 1.5rem;
      border: 1px solid #d4b896;
      margin-top: 1rem;
    }
    .tab-buttons { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .list-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.5rem 0; border-bottom: 1px dashed #d4b896; flex-wrap: wrap; gap: 0.5rem;
    }
    .warning { color: #b45f5f; font-size: 0.85rem; }
    .input-group.input {
      padding: 0.5rem 0.8rem; border-radius: 24px; border: 1px solid #cfbfa0;
      font-family: inherit; background: rgba(255,255,250,0.8); flex: 1 1 120px; min-width: 100px;
    }
    form { display: contents; }
  </style>
</head>
<body>
  <div class="clouds" id="cloudsContainer"></div>
  <canvas id="petalCanvas"></canvas>
  <canvas id="rippleCanvas"></canvas>

  <div class="main-container">
    <div class="header">
      <div class="plaque-wrapper">
        <div class="plaque">
          <span class="shine"></span>
          <h1 class="plaque-title">墨韵·书签雅集</h1>
        </div>
      </div>
      <div class="user-area" id="userArea">
        <span class="greeting" id="greetingText">未登录·游客</span>
        <button class="btn" id="loginBtn">登 录</button>
        <button class="btn admin-btn" id="adminPanelBtn" style="display:none;">管理</button>
        <button class="btn" id="logoutBtn" style="display:none;">登出</button>
      </div>
    </div>

    <div class="sites-grid" id="sitesGrid"></div>

    <div style="text-align:right; margin-top:0.5rem;" id="userApplyArea" hidden>
      <button class="btn" id="applySiteBtn">📜 申请添加网站</button>
    </div>

    <div class="admin-panel" id="adminPanel" style="display:none;">
      <h3 style="font-family:'Ma Shan Zheng'; font-size:1.8rem; color:#4a3828;">🔰 管理面板</h3>
      <div class="tab-buttons">
        <button class="btn tab-btn active" data-tab="siteManage">网站管理</button>
        <button class="btn tab-btn" data-tab="userManage">用户管理</button>
        <button class="btn tab-btn" data-tab="applyManage">待审核申请</button>
      </div>
      <div class="tab-content active" id="siteManage">
        <form onsubmit="return false" style="margin-bottom:1rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
          <input type="text" id="newSiteName" placeholder="网站名称" class="input-group input">
          <input type="text" id="newSiteUrl" placeholder="网址" class="input-group input">
          <input type="text" id="newSiteDesc" placeholder="描述" class="input-group input">
          <input type="text" id="newSiteSeal" placeholder="印章(1字)" maxlength="2" class="input-group input">
          <input type="text" id="newSiteCat" placeholder="分类" class="input-group input">
          <button class="btn" id="addSiteBtn">添加网站</button>
        </form>
        <div id="siteListManage"></div>
      </div>
      <div class="tab-content" id="userManage">
        <form onsubmit="return false" style="margin-bottom:1rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
          <input type="text" id="newUsername" placeholder="新用户名" class="input-group input" autocomplete="off">
          <input type="password" id="newUserPass" placeholder="密码" class="input-group input" autocomplete="new-password">
          <button class="btn" id="addUserBtn">添加用户</button>
        </form>
        <div id="userListManage"></div>
        <p class="warning">※ 修改他人密码：将删除原用户并重新创建相同用户名。修改主管理员(zlm)密码需后端支持。</p>
      </div>
      <div class="tab-content" id="applyManage">
        <div id="applyListManage"></div>
      </div>
    </div>
  </div>

  <!-- 登录模态框 -->
  <div class="modal-overlay" id="loginModal">
    <div class="modal">
      <button class="close-btn" id="closeLoginModal">&times;</button>
      <h2>登录书斋</h2>
      <form onsubmit="return false">
        <div class="input-group"><label>账号</label><input type="text" id="loginUsername" placeholder="请输入账号" autocomplete="username"></div>
        <div class="input-group"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password"></div>
        <div class="modal-actions"><button class="btn" id="submitLogin">登 录</button></div>
      </form>
      <p style="text-align:center; margin-top:1rem; font-size:0.85rem; color:#8b7a62;">游客可浏览，登录后更多功能</p>
    </div>
  </div>

  <!-- 申请网站模态框 -->
  <div class="modal-overlay" id="applyModal">
    <div class="modal">
      <button class="close-btn" id="closeApplyModal">&times;</button>
      <h2>申请收录网站</h2>
      <form onsubmit="return false">
        <div class="input-group"><label>网站名称</label><input type="text" id="applyName" placeholder="必填"></div>
        <div class="input-group"><label>网址</label><input type="text" id="applyUrl" placeholder="必填"></div>
        <div class="input-group"><label>描述</label><input type="text" id="applyDesc"></div>
        <div class="input-group"><label>印章(一字)</label><input type="text" id="applySeal" maxlength="2"></div>
        <div class="input-group"><label>分类</label><input type="text" id="applyCat"></div>
        <div class="modal-actions"><button class="btn" id="submitApply">提交申请</button></div>
      </form>
    </div>
  </div>

  <!-- 修改密码模态框 -->
  <div class="modal-overlay" id="changePassModal">
    <div class="modal">
      <button class="close-btn" id="closeChangePassModal">&times;</button>
      <h2>修改密码</h2>
      <form onsubmit="return false">
        <div class="input-group"><label>用户名</label><input type="text" id="changePassUser" readonly></div>
        <div class="input-group"><label>新密码</label><input type="password" id="changePassNew" autocomplete="new-password"></div>
        <div class="modal-actions"><button class="btn" id="submitChangePass">确认修改</button></div>
      </form>
      <p class="warning" style="margin-top:0.5rem;">※ 管理员修改他人密码通过删除后重建实现；修改主管理员(zlm)密码需后端支持。</p>
    </div>
  </div>

  <script>
    (function() {
      const API_BASE = 'https://myzlm.serveousercontent.com';
      const APPLY_STORAGE_KEY = 'ink_nav_applications';

      let currentUser = null;
      let sites = [];
      let localApplications = JSON.parse(localStorage.getItem(APPLY_STORAGE_KEY) || '[]');

      const $ = (sel) => document.querySelector(sel);
      const $$ = (sel) => document.querySelectorAll(sel);

      function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return String(text).replace(/[&<>"']/g, m => map[m]);
      }

      async function apiCall(url, options = {}, silent = false) {
        const config = {
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          ...options,
        };
        if (config.body && typeof config.body === 'object') config.body = JSON.stringify(config.body);
        try {
          const res = await fetch(API_BASE + url, config);
          if (!res.ok) {
            if (silent) return null;
            const data = await res.json().catch(() => ({}));
            throw new Error(data.error || `请求失败 (${res.status})`);
          }
          return await res.json();
        } catch (e) {
          if (silent) return null;
          throw e;
        }
      }

      function updateUIByRole() {
        const greeting = $('#greetingText');
        const loginBtn = $('#loginBtn');
        const logoutBtn = $('#logoutBtn');
        const adminBtn = $('#adminPanelBtn');
        const adminPanel = $('#adminPanel');
        const userApply = $('#userApplyArea');

        if (currentUser) {
          greeting.textContent = `${currentUser.role === 'admin' ? '🔰' : '📖'} ${currentUser.username}`;
          loginBtn.style.display = 'none';
          logoutBtn.style.display = 'inline-block';
          if (currentUser.role === 'admin') {
            adminBtn.style.display = 'inline-block';
            adminPanel.style.display = 'block';
            userApply.style.display = 'none';
          } else {
            adminBtn.style.display = 'none';
            adminPanel.style.display = 'none';
            userApply.hidden = false;
          }
        } else {
          greeting.textContent = '未登录·游客';
          loginBtn.style.display = 'inline-block';
          logoutBtn.style.display = 'none';
          adminBtn.style.display = 'none';
          adminPanel.style.display = 'none';
          userApply.hidden = true;
        }
        renderSites();
        if (currentUser && currentUser.role === 'admin') {
          renderAdminPanels();
        }
      }

      function renderSites() {
        const grid = $('#sitesGrid');
        grid.innerHTML = '';
        sites.forEach((site, index) => {
          const card = document.createElement('a');
          card.className = 'site-card';
          card.href = site.url;
          card.target = '_blank';
          card.rel = 'noopener noreferrer';
          card.addEventListener('click', () => {
            apiCall(`/api/sites/${index}/visit`, { method: 'POST' }, true).catch(() => {});
          });
          card.innerHTML = `
            <div class="seal">${escapeHtml(site.seal || '🔗')}</div>
            <div class="site-info">
              <div class="site-name">${escapeHtml(site.name)}</div>
              <div class="site-desc">${escapeHtml(site.desc || '')}</div>
              <div class="site-meta">
                <span class="site-category">${escapeHtml(site.category || '其他')}</span>
                <span>👁️ ${site.visits || 0}</span>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });
      }

      function renderAdminPanels() { renderSiteManage(); renderUserManage(); renderApplyManage(); }

      function renderSiteManage() {
        const container = $('#siteListManage');
        container.innerHTML = sites.map((s, i) => `
          <div class="list-item">
            <span>${escapeHtml(s.name)} - <small>${escapeHtml(s.url)}</small></span>
            <button class="btn" data-del-site="${i}">删除</button>
          </div>
        `).join('');
        container.querySelectorAll('[data-del-site]').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            if (!confirm('确认删除？')) return;
            try {
              await apiCall(`/api/sites/${e.target.dataset.delSite}`, { method: 'DELETE' });
              await refreshSites();
            } catch (err) { alert('删除失败: ' + err.message); }
          });
        });
      }

      async function refreshSites() {
        try {
          sites = await apiCall('/api/sites');
          renderSites();
          if (currentUser?.role === 'admin') renderSiteManage();
        } catch (e) {}
      }

      async function refreshUsersAndRender() {
        if (!currentUser || currentUser.role !== 'admin') return;
        try {
          const users = await apiCall('/api/users');
          renderUserList(users);
        } catch (e) {}
      }

      function renderUserManage() { refreshUsersAndRender(); }

      function renderUserList(users) {
        const container = $('#userListManage');
        container.innerHTML = users.map(u => `
          <div class="list-item">
            <span>${escapeHtml(u.username)}</span>
            <div style="display:flex;gap:0.3rem;">
              <button class="btn change-pass-btn" data-username="${escapeHtml(u.username)}">改密</button>
              ${u.username !== 'zlm' ? `<button class="btn del-user-btn" data-username="${escapeHtml(u.username)}">删除</button>` : ''}
            </div>
          </div>
        `).join('');
        container.querySelectorAll('.del-user-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            if (!confirm('删除用户？')) return;
            try {
              await apiCall(`/api/users/${encodeURIComponent(e.target.dataset.username)}`, { method: 'DELETE' });
              refreshUsersAndRender();
            } catch (err) { alert('删除失败: ' + err.message); }
          });
        });
        container.querySelectorAll('.change-pass-btn').forEach(btn => {
          btn.addEventListener('click', (e) => openChangePassModal(e.target.dataset.username));
        });
      }

      function openChangePassModal(username) {
        $('#changePassUser').value = username;
        $('#changePassNew').value = '';
        $('#changePassModal').classList.add('active');
      }

      function renderApplyManage() {
        const container = $('#applyListManage');
        if (!localApplications.length) {
          container.innerHTML = '<p style="color:#8b7a62;">暂无待审核申请。</p>';
          return;
        }
        container.innerHTML = localApplications.map((app, idx) => `
          <div class="list-item">
            <span>${escapeHtml(app.name)} (${escapeHtml(app.url)})</span>
            <div>
              <button class="btn approve-btn" data-index="${idx}">通过</button>
              <button class="btn reject-btn" data-index="${idx}">拒绝</button>
            </div>
          </div>
        `).join('');
        container.querySelectorAll('.approve-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const app = localApplications[e.target.dataset.index];
            try {
              await apiCall('/api/sites', { method: 'POST', body: app });
              localApplications.splice(e.target.dataset.index, 1);
              localStorage.setItem(APPLY_STORAGE_KEY, JSON.stringify(localApplications));
              await refreshSites();
              renderApplyManage();
            } catch (err) { alert('添加失败: ' + err.message); }
          });
        });
        container.querySelectorAll('.reject-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            if (confirm('拒绝申请？')) {
              localApplications.splice(e.target.dataset.index, 1);
              localStorage.setItem(APPLY_STORAGE_KEY, JSON.stringify(localApplications));
              renderApplyManage();
            }
          });
        });
      }

      async function checkLoginStatus() {
        const data = await apiCall('/api/me', {}, true);
        if (data && data.username) {
          currentUser = data;
        } else {
          currentUser = null;
        }
        updateUIByRole();
        if (currentUser?.role === 'admin') refreshUsersAndRender();
      }

      function initClouds() {
        const container = $('#cloudsContainer');
        for (let i = 0; i < 6; i++) {
          const cloud = document.createElement('div');
          cloud.className = 'cloud';
          const size = 80 + Math.random() * 100;
          cloud.style.width = size + 'px';
          cloud.style.height = size * 0.6 + 'px';
          cloud.style.top = (5 + Math.random() * 60) + '%';
          cloud.style.animationDuration = (15 + Math.random() * 25) + 's';
          cloud.style.animationDelay = Math.random() * 10 + 's';
          container.appendChild(cloud);
        }
      }

      function initPetals() {
        const canvas = $('#petalCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        const petals = [];
        const petalCount = 35;
        function resize() {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();
        class Petal {
          constructor() { this.reset(true); }
          reset(initial = false) {
            this.x = Math.random() * width;
            this.y = initial ? Math.random() * height : -20;
            this.size = 8 + Math.random() * 14;
            this.speedY = 1 + Math.random() * 2.5;
            this.speedX = 0.3 + Math.random() * 0.8;
            this.rotation = Math.random() * Math.PI * 2;
            this.rotSpeed = (Math.random() - 0.5) * 0.02;
            this.opacity = 0.7 + Math.random() * 0.3;
            this.color = `rgba(232, 160, 170, ${this.opacity})`;
          }
          update() {
            this.y += this.speedY;
            this.x += Math.sin(this.y * 0.02) * this.speedX;
            this.rotation += this.rotSpeed;
            if (this.y > height + 20) this.reset();
          }
          draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, this.size * 0.6, this.size * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(0, 0, this.size * 0.3, this.size * 0.6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        }
        for (let i = 0; i < petalCount; i++) petals.push(new Petal());
        function animate() {
          ctx.clearRect(0, 0, width, height);
          petals.forEach(p => { p.update(); p.draw(ctx); });
          requestAnimationFrame(animate);
        }
        animate();
      }

      function initRipples() {
        const canvas = $('#rippleCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        const ripples = [];
        const maxRipples = 15;
        function resize() {
          width = window.innerWidth;
          height = window.innerHeight;
          canvas.width = width;
          canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();
        window.addEventListener('click', (e) => {
          ripples.push({
            x: e.clientX, y: e.clientY, radius: 2,
            maxRadius: 50 + Math.random() * 80, opacity: 0.7,
            speed: 0.8 + Math.random() * 0.6,
          });
          if (ripples.length > maxRipples) ripples.shift();
        });
        function drawRipple(ctx, r) {
          const gradient = ctx.createRadialGradient(r.x, r.y, r.radius * 0.1, r.x, r.y, r.radius);
          gradient.addColorStop(0, `rgba(20, 15, 10, ${r.opacity})`);
          gradient.addColorStop(0.4, `rgba(40, 30, 20, ${r.opacity * 0.7})`);
          gradient.addColorStop(0.7, `rgba(80, 60, 40, ${r.opacity * 0.3})`);
          gradient.addColorStop(1, `rgba(120, 90, 60, 0)`);
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
          ctx.fill();
        }
        function animate() {
          ctx.clearRect(0, 0, width, height);
          for (let i = ripples.length - 1; i >= 0; i--) {
            const r = ripples[i];
            r.radius += r.speed;
            r.opacity -= 0.008;
            if (r.opacity <= 0 || r.radius > r.maxRadius) ripples.splice(i, 1);
            else drawRipple(ctx, r);
          }
          requestAnimationFrame(animate);
        }
        animate();
      }

      function bindEvents() {
        $('#loginBtn').addEventListener('click', () => $('#loginModal').classList.add('active'));
        $('#closeLoginModal').addEventListener('click', () => $('#loginModal').classList.remove('active'));
        $('#submitLogin').addEventListener('click', async () => {
          const username = $('#loginUsername').value.trim();
          const password = $('#loginPassword').value;
          if (!username || !password) return alert('请输入账号和密码');
          try {
            const data = await apiCall('/api/login', { method: 'POST', body: { username, password } });
            currentUser = { username: data.username, role: data.role };
            $('#loginModal').classList.remove('active');
            updateUIByRole();
            if (currentUser.role === 'admin') refreshUsersAndRender();
            alert(`登录成功，欢迎 ${data.username}`);
          } catch (err) { alert('登录失败: ' + err.message); }
        });

        $('#logoutBtn').addEventListener('click', async () => {
          await apiCall('/api/logout', { method: 'POST' });
          currentUser = null;
          updateUIByRole();
        });

        $('#adminPanelBtn').addEventListener('click', () => {
          const panel = $('#adminPanel');
          panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        });

        $$('.tab-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            $$('.tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            $$('.tab-content').forEach(c => c.classList.remove('active'));
            $('#' + this.dataset.tab).classList.add('active');
          });
        });

        $('#addSiteBtn').addEventListener('click', async () => {
          const name = $('#newSiteName').value.trim();
          const url = $('#newSiteUrl').value.trim();
          if (!name || !url) return alert('名称和网址必填');
          try {
            await apiCall('/api/sites', { method: 'POST', body: {
              name, url,
              desc: $('#newSiteDesc').value.trim(),
              seal: $('#newSiteSeal').value.trim() || '🔗',
              category: $('#newSiteCat').value.trim() || '其他'
            }});
            ['newSiteName','newSiteUrl','newSiteDesc','newSiteSeal','newSiteCat'].forEach(id => $('#'+id).value = '');
            await refreshSites();
          } catch (err) { alert(err.message); }
        });

        $('#addUserBtn').addEventListener('click', async () => {
          const username = $('#newUsername').value.trim();
          const password = $('#newUserPass').value;
          if (!username || !password) return alert('用户名和密码不能为空');
          try {
            await apiCall('/api/users', { method: 'POST', body: { username, password } });
            $('#newUsername').value = '';
            $('#newUserPass').value = '';
            refreshUsersAndRender();
          } catch (err) { alert(err.message); }
        });

        $('#submitChangePass').addEventListener('click', async () => {
          const username = $('#changePassUser').value;
          const newPass = $('#changePassNew').value;
          if (!newPass) return alert('请输入新密码');
          if (username === 'zlm') {
            alert('修改主管理员密码需要后端专用接口。');
            return;
          }
          if (!confirm(`将通过删除并重建用户“${username}”来修改密码，继续？`)) return;
          try {
            await apiCall(`/api/users/${encodeURIComponent(username)}`, { method: 'DELETE' });
            await apiCall('/api/users', { method: 'POST', body: { username, password: newPass } });
            alert('密码已修改');
            $('#changePassModal').classList.remove('active');
            refreshUsersAndRender();
          } catch (err) { alert('操作失败: ' + err.message); }
        });
        $('#closeChangePassModal').addEventListener('click', () => $('#changePassModal').classList.remove('active'));

        $('#applySiteBtn').addEventListener('click', () => $('#applyModal').classList.add('active'));
        $('#closeApplyModal').addEventListener('click', () => $('#applyModal').classList.remove('active'));
        $('#submitApply').addEventListener('click', () => {
          const name = $('#applyName').value.trim();
          const url = $('#applyUrl').value.trim();
          if (!name || !url) return alert('名称和网址必填');
          localApplications.push({
            name, url,
            desc: $('#applyDesc').value.trim(),
            seal: $('#applySeal').value.trim() || '🔗',
            category: $('#applyCat').value.trim() || '其他'
          });
          localStorage.setItem(APPLY_STORAGE_KEY, JSON.stringify(localApplications));
          alert('申请已提交，等待管理员审核。');
          $('#applyModal').classList.remove('active');
          ['applyName','applyUrl','applyDesc','applySeal','applyCat'].forEach(id => $('#'+id).value = '');
        });

        window.addEventListener('click', (e) => {
          if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('active');
        });
      }

      async function init() {
        initClouds();
        initPetals();
        initRipples();
        bindEvents();
        try {
          sites = await apiCall('/api/sites');
        } catch (e) { sites = []; }
        await checkLoginStatus();
        renderSites();
      }

      init();
    })();
  </script>
</body>
</html>

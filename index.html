<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>万壑松风 · 雅集</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" />

    <!-- ========== 核心修改：直接在此处定义 API 地址 ========== -->
    <script>
        // 这个变量不再依赖 config.js 或 GitHub Secrets，前端直接读取
         const API_BASE = 'https://doug-mailing-contract-because.trycloudflare.com';
    </script>

    <style>
        /* ==================== 万壑松风 · 雅集 古风动态样式 ==================== */
        :root {
            --paper: rgba(247, 242, 232, 0.4);
            --paper-light: rgba(253, 250, 243, 0.45);
            --ink: #2a2218;
            --ink-light: #5c4f3a;
            --ink-lighter: #8a7b65;
            --vermillion: #c43d3d;
            --vermillion-light: #d46565;
            --gold: #b8944b;
            --gold-light: #d4b66a;
            --shadow-soft: 0 2px 16px rgba(40, 20, 10, 0.07);
            --shadow-medium: 0 6px 28px rgba(40, 20, 10, 0.12);
            --radius-card: 6px;
            --font-body: "Noto Serif SC", "Songti SC", "STSong", "SimSun", serif;
            --font-heading: "ZCOOL XiaoWei", "KaiTi", "STKaiti", "华文楷体", serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            /* ========== 电脑端背景图 (直接放在根目录) ========== */
            background-image: url('bg-pc.png');
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgba(247, 242, 232, 0.25);
            background-blend-mode: overlay;

            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* ========== 手机端背景替换 ========== */
        @media (max-width: 600px) {
            body {
                background-image: url('bg-mobile.png');
                background-position: center center;
            }
        }

        body::before {
            content: none;
        }

        /* ========== 云雾层 ========== */
        .clouds-layer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70%;
            pointer-events: none;
            z-index: 1;
        }

        .cloud {
            position: absolute;
            background: radial-gradient(ellipse at center,
                    rgba(255, 252, 245, 0.6) 0%,
                    rgba(245, 238, 225, 0.4) 25%,
                    rgba(235, 225, 210, 0.15) 55%,
                    transparent 75%);
            border-radius: 50%;
            filter: blur(24px);
        }
        .cloud-1 { width: 360px; height: 90px; bottom: 42%; left: -10%; animation: cloudDrift1 28s linear infinite; opacity: 0.45; }
        .cloud-2 { width: 280px; height: 70px; bottom: 35%; left: 55%; animation: cloudDrift2 32s linear infinite; animation-delay: -8s; opacity: 0.4; }
        .cloud-3 { width: 420px; height: 100px; bottom: 26%; left: 25%; animation: cloudDrift3 36s linear infinite; animation-delay: -16s; opacity: 0.5; }
        .cloud-4 { width: 220px; height: 60px; bottom: 46%; left: 70%; animation: cloudDrift1 24s linear infinite; animation-delay: -5s; opacity: 0.35; }
        .cloud-5 { width: 300px; height: 80px; bottom: 30%; left: -15%; animation: cloudDrift2 30s linear infinite; animation-delay: -20s; opacity: 0.4; }
        .cloud-6 { width: 380px; height: 95px; bottom: 22%; left: 45%; animation: cloudDrift3 38s linear infinite; animation-delay: -12s; opacity: 0.5; }

        @keyframes cloudDrift1 {
            from { transform: translateX(-400px); }
            to { transform: translateX(calc(100vw + 450px)); }
        }
        @keyframes cloudDrift2 {
            from { transform: translateX(-350px); }
            to { transform: translateX(calc(100vw + 400px)); }
        }
        @keyframes cloudDrift3 {
            from { transform: translateX(-480px); }
            to { transform: translateX(calc(100vw + 520px)); }
        }

        /* ========== 飘落花瓣 ========== */
        .petals {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            overflow: hidden;
        }
        .petal {
            position: absolute;
            top: -30px;
            width: 12px;
            height: 16px;
            background: radial-gradient(ellipse at 35% 30%,
                    rgba(235, 175, 160, 0.7), rgba(220, 145, 130, 0.5) 40%, transparent 70%);
            border-radius: 45% 55% 50% 50%;
            animation: petalFall linear infinite;
            opacity: 0;
        }
        .petal:nth-child(1) { left: 5%; animation-duration: 7.2s; animation-delay: 0s; }
        .petal:nth-child(2) { left: 12%; animation-duration: 8.5s; animation-delay: 1.2s; width: 10px; height: 14px; }
        .petal:nth-child(3) { left: 22%; animation-duration: 6.8s; animation-delay: 3s; width: 14px; height: 18px; }
        .petal:nth-child(4) { left: 30%; animation-duration: 9s; animation-delay: 0.6s; }
        .petal:nth-child(5) { left: 40%; animation-duration: 7.6s; animation-delay: 4.2s; width: 16px; height: 20px; }
        .petal:nth-child(6) { left: 48%; animation-duration: 8.1s; animation-delay: 2s; }
        .petal:nth-child(7) { left: 56%; animation-duration: 6.5s; animation-delay: 5s; width: 13px; height: 17px; }
        .petal:nth-child(8) { left: 65%; animation-duration: 8.8s; animation-delay: 1.8s; }
        .petal:nth-child(9) { left: 72%; animation-duration: 7s; animation-delay: 3.6s; width: 15px; height: 19px; }
        .petal:nth-child(10) { left: 80%; animation-duration: 9.2s; animation-delay: 0.3s; }
        .petal:nth-child(11) { left: 88%; animation-duration: 7.9s; animation-delay: 4.8s; }
        .petal:nth-child(12) { left: 94%; animation-duration: 8.3s; animation-delay: 2.5s; width: 11px; height: 15px; }

        @keyframes petalFall {
            0% { transform: translateY(-60px) translateX(0) rotate(0deg) scale(0.6); opacity: 0; }
            4% { opacity: 0.75; }
            12% { transform: translateY(12vh) translateX(25px) rotate(55deg) scale(0.85); opacity: 0.7; }
            25% { transform: translateY(25vh) translateX(-18px) rotate(120deg) scale(0.95); opacity: 0.6; }
            40% { transform: translateY(40vh) translateX(35px) rotate(190deg) scale(0.8); opacity: 0.55; }
            55% { transform: translateY(55vh) translateX(-28px) rotate(260deg) scale(0.9); opacity: 0.5; }
            70% { transform: translateY(70vh) translateX(20px) rotate(330deg) scale(0.75); opacity: 0.4; }
            85% { transform: translateY(85vh) translateX(-15px) rotate(400deg) scale(0.55); opacity: 0.2; }
            96% { opacity: 0.05; }
            100% { transform: translateY(105vh) translateX(8px) rotate(480deg) scale(0.3); opacity: 0; }
        }

        /* ========== 登录卡片 ========== */
        .login-container {
            position: relative;
            z-index: 10;
            width: 380px;
            max-width: 90%;
            background: var(--paper-light);
            border: 1px solid rgba(140, 120, 90, 0.4);
            border-radius: var(--radius-card);
            padding: 40px 30px 30px;
            box-shadow: var(--shadow-medium), inset 0 0 20px rgba(255, 250, 240, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease;
            backdrop-filter: blur(8px);
        }
        .login-container::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 12px;
            right: 12px;
            bottom: 8px;
            border: 1px solid rgba(180, 140, 70, 0.2);
            border-radius: 3px;
            pointer-events: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-title { font-family: var(--font-heading); font-size: 2.2rem; font-weight: 700; margin-bottom: 6px; color: var(--ink); letter-spacing: 0.12em; text-shadow: 0 1px 1px rgba(180, 150, 100, 0.3); }
        .login-subtitle { font-size: 0.9rem; color: var(--ink-lighter); margin-bottom: 28px; letter-spacing: 0.2em; }
        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--ink-light); margin-bottom: 6px; letter-spacing: 0.05em; font-family: var(--font-heading); }
        .input-group input { width: 100%; padding: 10px 14px; border: 1px solid rgba(140, 120, 90, 0.5); background: rgba(250, 245, 235, 0.6); font-family: var(--font-body); color: var(--ink); border-radius: 4px; transition: border-color 0.3s, box-shadow 0.3s; outline: none; }
        .input-group input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(180, 140, 60, 0.25); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-family: var(--font-heading); font-size: 1.1rem; letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s; margin-top: 8px; }
        .btn-login { background: var(--vermillion); color: #fef8f0; box-shadow: 0 4px 12px rgba(180, 40, 30, 0.3); }
        .btn-login:hover { background: #b53535; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(180, 40, 30, 0.4); }
        .btn-guest { background: rgba(255, 255, 255, 0.2); color: var(--ink-light); border: 1px solid rgba(140, 120, 90, 0.5); backdrop-filter: blur(4px); }
        .btn-guest:hover { background: rgba(180, 140, 60, 0.2); border-color: var(--gold); }
        .error-msg { color: var(--vermillion); font-size: 0.8rem; margin-top: 8px; min-height: 20px; }

        /* ========== 主界面 ========== */
        .main-app { display: none; width: 100%; max-width: 960px; margin: 0 auto; padding: 30px 24px 50px; position: relative; z-index: 10; }
        .plaque-hangers { display: flex; justify-content: center; gap: 50px; margin-bottom: -5px; position: relative; z-index: 1; }
        .plaque-hanger { width: 3px; height: 22px; background: linear-gradient(180deg, #8b6d4a, #c4a870, #8b6d4a); border-radius: 2px; position: relative; }
        .plaque-hanger::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 12px; height: 12px; background: radial-gradient(circle, #c4a870, #8b6d4a); border-radius: 50%; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3); }
        .header-plaque { text-align: center; margin: 0 auto 20px; background: linear-gradient(180deg, #4a3525 0%, #3d2a1a 8%, #5c3d28 15%, #4a3020 30%, #3d2518 50%, #4a3020 70%, #5c3d28 85%, #3d2a1a 95%, #4a3525 100%); padding: 14px 50px; display: inline-block; border-radius: 6px; border: 3px solid #6b4d30; outline: 2px solid #8b6d4a; outline-offset: -8px; box-shadow: inset 0 2px 4px rgba(255, 220, 160, 0.15), inset 0 -3px 4px rgba(0,0,0,0.3), 0 6px 24px rgba(30,15,5,0.5), 0 2px 0 #7a5a3a, 0 4px 0 #5a3d25, 0 6px 0 #3d2518; color: #e8d5a3; font-size: 2rem; font-family: var(--font-heading); letter-spacing: 0.18em; position: relative; text-shadow: 0 1px 2px rgba(0,0,0,0.6), 0 0 20px rgba(220,180,100,0.4); }
        .header-plaque::before { content: ''; position: absolute; top: 8px; left: 14px; right: 14px; bottom: 8px; border: 1px solid rgba(200,160,90,0.4); border-radius: 3px; pointer-events: none; }
        .header-plaque::after { content: '❖'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10px; color: rgba(200,160,90,0.3); letter-spacing: 80px; white-space: nowrap; text-indent: -30px; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 25px; padding: 0 5px; }
        .role-badge { font-size: 0.9rem; background: rgba(180, 140, 60, 0.2); padding: 5px 18px; border-radius: 20px; color: var(--ink-light); font-family: var(--font-heading); letter-spacing: 0.05em; border: 1px solid rgba(180, 140, 60, 0.3); backdrop-filter: blur(4px); }
        .btn-sm { background: rgba(250, 245, 235, 0.5); border: 1px solid var(--gold); color: var(--ink); padding: 6px 18px; border-radius: 4px; cursor: pointer; font-family: var(--font-body); transition: 0.2s; font-size: 0.85rem; backdrop-filter: blur(4px); }
        .btn-sm:hover { background: rgba(180, 140, 60, 0.2); border-color: var(--gold-light); }
        .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card-link { display: flex; align-items: center; gap: 14px; background: var(--paper-light); border: 1px solid rgba(140, 120, 90, 0.35); border-radius: var(--radius-card); padding: 18px 16px; text-decoration: none; color: var(--ink); box-shadow: var(--shadow-soft); transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94); overflow: hidden; position: relative; backdrop-filter: blur(8px); }
        .card-link::before { content: ''; position: absolute; left: 0; top: 12px; bottom: 12px; width: 3px; background: linear-gradient(180deg, var(--vermillion-light), var(--vermillion), var(--vermillion-light)); border-radius: 0 2px 2px 0; opacity: 0.8; transition: all 0.3s; }
        .card-link::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 2px; background: radial-gradient(ellipse at center, rgba(200,160,80,0.4) 0%, transparent 70%); opacity: 0; transition: opacity 0.3s; }
        .card-link:hover { transform: translateY(-5px); box-shadow: var(--shadow-medium), 0 8px 25px rgba(180,140,60,0.15); border-color: rgba(180,140,70,0.6); }
        .card-link:hover::before { opacity: 1; box-shadow: 0 0 12px rgba(196,61,61,0.3); }
        .card-link:hover::after { opacity: 1; }
        .card-seal { width: 44px; height: 44px; background: var(--vermillion); color: #fef8f0; display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-size: 1.4rem; font-weight: 700; border-radius: 3px; transform: rotate(-3deg); box-shadow: inset 0 1px 3px rgba(255,180,150,0.3), inset 0 -1px 3px rgba(0,0,0,0.25), 0 3px 8px rgba(180,40,30,0.35); transition: all 0.3s; position: relative; animation: sealBreathe 4s ease-in-out infinite; }
        @keyframes sealBreathe { 0%, 100% { transform: rotate(-3deg) scale(1); } 50% { transform: rotate(-2deg) scale(1.03); } }
        .card-seal::after { content: ''; position: absolute; inset: 3px; border: 1px solid rgba(255,220,200,0.4); border-radius: 1px; pointer-events: none; }
        .card-link:hover .card-seal { transform: rotate(-1deg) scale(1.08); box-shadow: 0 6px 18px rgba(180,40,30,0.5); animation: none; }
        .card-content h3 { font-family: var(--font-heading); font-size: 1.05rem; margin-bottom: 4px; letter-spacing: 0.06em; transition: color 0.3s; }
        .card-link:hover .card-content h3 { color: #1a1008; }
        .card-content .card-desc { font-size: 0.78rem; color: var(--ink-lighter); line-height: 1.4; }

        /* ========== 管理员面板 ========== */
        .admin-panel { background: rgba(250, 245, 235, 0.6); border: 1px solid rgba(180, 140, 60, 0.4); border-radius: 8px; padding: 20px; margin-top: 35px; backdrop-filter: blur(8px); box-shadow: var(--shadow-soft); }
        .admin-panel h3 { font-family: var(--font-heading); margin-bottom: 18px; font-size: 1.2rem; letter-spacing: 0.1em; color: var(--ink); border-bottom: 1px solid rgba(180, 140, 60, 0.3); padding-bottom: 8px; }
        .admin-panel h4 { font-family: var(--font-heading); margin-bottom: 10px; font-weight: normal; color: var(--ink-light); }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px; border-bottom: 1px dashed rgba(140, 120, 90, 0.25); font-size: 0.9rem; }
        .list-item button { font-size: 0.8rem; padding: 4px 12px; }

        /* ========== 响应式 ========== */
        @media (max-width: 900px) { .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; } .header-plaque { padding: 12px 30px; font-size: 1.6rem; } .header-plaque::after { letter-spacing: 50px; font-size: 8px; text-indent: -20px; } .plaque-hangers { gap: 35px; } .plaque-hanger { height: 18px; } }
        @media (max-width: 600px) { .cards-grid { grid-template-columns: 1fr; } .login-container { padding: 30px 20px; } .header-plaque { padding: 10px 20px; font-size: 1.3rem; border-width: 2px; outline-width: 1.5px; outline-offset: -5px; } .header-plaque::after { letter-spacing: 30px; font-size: 6px; } .plaque-hangers { gap: 25px; } .plaque-hanger { width: 2px; height: 14px; } .card-link { padding: 14px 12px; } .card-seal { width: 38px; height: 38px; font-size: 1.2rem; } .cloud { filter: blur(14px); } }
    </style>
</head>
<body>

    <!-- 云雾层 -->
    <div class="clouds-layer" aria-hidden="true">
        <div class="cloud cloud-1"></div><div class="cloud cloud-2"></div><div class="cloud cloud-3"></div>
        <div class="cloud cloud-4"></div><div class="cloud cloud-5"></div><div class="cloud cloud-6"></div>
    </div>

    <!-- 飘落花瓣 -->
    <div class="petals" aria-hidden="true">
        <span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal"></span><span class="petal"></span><span class="petal"></span>
        <span class="petal"></span><span class="petal"></span><span class="petal"></span>
    </div>

    <!-- 登录界面 -->
    <div id="loginScreen" class="login-container">
        <div class="login-title">万壑松风</div>
        <div class="login-subtitle">· 雅集 · 登入</div>
        <div class="input-group">
            <label>账号</label>
            <input type="text" id="usernameInput" placeholder="输入账号" autocomplete="off" />
        </div>
        <div class="input-group">
            <label>密码</label>
            <input type="password" id="passwordInput" placeholder="输入密码" />
        </div>
        <div class="error-msg" id="loginError"></div>
        <button class="btn btn-login" id="loginBtn">登 录</button>
        <button class="btn btn-guest" id="guestBtn">游客模式 · 直接进入</button>
        <div style="margin-top:16px; font-size:0.7rem; color:var(--ink-lighter);">管理员演示: zlm / zlm20130503</div>
    </div>

    <!-- 主界面 -->
    <div id="mainApp" class="main-app">
        <div style="text-align:center;">
            <div class="plaque-hangers" aria-hidden="true">
                <span class="plaque-hanger"></span>
                <span class="plaque-hanger"></span>
            </div>
            <div class="header-plaque">万壑松风 · 雅集</div>
        </div>
        <div class="toolbar">
            <span class="role-badge" id="roleDisplay"></span>
            <button class="btn-sm" id="logoutBtn">退出登录</button>
        </div>
        <div id="cardsContainer" class="cards-grid"></div>

        <!-- 管理员面板 -->
        <div id="adminPanel" class="admin-panel" style="display:none;">
            <h3>⚙️ 管理员设置</h3>
            <div style="display:flex; gap:20px; flex-wrap:wrap;">
                <div style="flex:1; min-width:200px;">
                    <h4>账号管理</h4>
                    <div style="display:flex; gap:6px; margin-bottom:10px;">
                        <input type="text" id="newUser" placeholder="新账号" style="flex:1; padding:6px;" />
                        <input type="password" id="newPass" placeholder="密码" style="flex:1; padding:6px;" />
                        <button class="btn-sm" id="addUserBtn">添加</button>
                    </div>
                    <div id="userList" style="max-height:150px; overflow-y:auto;"></div>
                </div>
                <div style="flex:1; min-width:250px;">
                    <h4>网站列表管理</h4>
                    <div style="display:flex; flex-direction:column; gap:8px;">
                        <input type="text" id="newSiteName" placeholder="网站名称" style="padding:6px;" />
                        <input type="text" id="newSiteUrl" placeholder="网址 (https://...)" style="padding:6px;" />
                        <input type="text" id="newSiteDesc" placeholder="简短描述" style="padding:6px;" />
                        <input type="text" id="newSiteSeal" placeholder="印章文字 (1-2字)" maxlength="2" style="padding:6px;" />
                        <button class="btn-sm" id="addSiteBtn">添加网站</button>
                    </div>
                    <div id="siteManageList" style="margin-top:14px; max-height:200px; overflow-y:auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // ================== 前端核心逻辑 ==================
        // 依靠 head 中定义的 API_BASE，不再依赖 config.js
        if (typeof API_BASE === 'undefined') {
            alert('错误：API_BASE 变量未定义，请检查 HTML 头部！');
            throw new Error('API_BASE is undefined');
        }

        let token = localStorage.getItem('gufeng_token') || '';
        let currentUser = null;

        async function api(url, options = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const res = await fetch(`${API_BASE}${url}`, {
                ...options,
                headers: { ...headers, ...options.headers }
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '请求失败');
            return data;
        }

        function showLoginScreen() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('mainApp').style.display = 'none';
            document.body.style.display = 'flex';
            document.body.style.alignItems = 'center';
        }

        function showMainApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.body.style.display = 'block';
            document.body.style.alignItems = 'unset';
            renderMain();
        }

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const errorDiv = document.getElementById('loginError');
            if (!username || !password) {
                errorDiv.textContent = '请输入账号和密码';
                return;
            }
            try {
                const res = await api('/api/login', { method: 'POST', body: JSON.stringify({ username, password }) });
                token = res.token;
                localStorage.setItem('gufeng_token', token);
                currentUser = { username: res.username, role: res.role };
                errorDiv.textContent = '';
                showMainApp();
            } catch (err) {
                errorDiv.textContent = err.message;
            }
        });

        document.getElementById('guestBtn').addEventListener('click', () => {
            token = '';
            localStorage.removeItem('gufeng_token');
            currentUser = { username: '游客', role: 'guest' };
            showMainApp();
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            token = '';
            localStorage.removeItem('gufeng_token');
            currentUser = null;
            showLoginScreen();
        });

        async function renderMain() {
            if (!currentUser) { showLoginScreen(); return; }
            document.getElementById('roleDisplay').textContent = currentUser.role === 'admin' ? '🔑 管理员' : '👤 游客';
            document.getElementById('adminPanel').style.display = currentUser.role === 'admin' ? 'block' : 'none';

            try {
                const sites = await api('/api/sites');
                renderCards(sites);
            } catch (err) {
                document.getElementById('cardsContainer').innerHTML =
                    '<p style="grid-column:1/-1; text-align:center; color:var(--vermillion);">加载失败，请检查网络</p>';
            }

            if (currentUser.role === 'admin') {
                try { const users = await api('/api/users'); renderUserList(users); } catch (e) {}
                try { const sites = await api('/api/sites'); renderSiteManageList(sites); } catch (e) {}
            }
        }

        function renderCards(sites) {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';
            if (!sites.length) {
                container.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--ink-lighter);">暂无网站</p>';
                return;
            }
            sites.forEach(site => {
                const a = document.createElement('a');
                a.className = 'card-link';
                a.href = site.url;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.innerHTML = `
                    <span class="card-seal">${escapeHtml(site.seal) || '🔗'}</span>
                    <span class="card-content">
                        <h3>${escapeHtml(site.name)}</h3>
                        <span class="card-desc">${escapeHtml(site.desc)}</span>
                    </span>
                `;
                container.appendChild(a);
            });
        }

        function renderUserList(users) {
            const div = document.getElementById('userList');
            div.innerHTML = '';
            users.forEach(user => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `
                    <span>${escapeHtml(user.username)} ${user.username==='zlm'?'(管理员)':''}</span>
                    ${user.username!=='zlm' ? '<button class="btn-sm del-user-btn">删除</button>' : ''}
                `;
                if (user.username !== 'zlm') {
                    item.querySelector('.del-user-btn').addEventListener('click', async () => {
                        if (!confirm(`确定删除账号 ${user.username} 吗？`)) return;
                        try {
                            await api(`/api/users/${user.username}`, { method: 'DELETE' });
                            alert('删除成功');
                            const users = await api('/api/users');
                            renderUserList(users);
                        } catch (e) { alert(e.message); }
                    });
                }
                div.appendChild(item);
            });
        }

        function renderSiteManageList(sites) {
            const div = document.getElementById('siteManageList');
            div.innerHTML = '';
            sites.forEach((site, idx) => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `
                    <span style="flex:1;">${escapeHtml(site.name)} (${escapeHtml(site.url)})</span>
                    <button class="btn-sm del-site-btn">删除</button>
                `;
                item.querySelector('.del-site-btn').addEventListener('click', async () => {
                    if (!confirm(`确定删除网站 "${site.name}" 吗？`)) return;
                    try {
                        await api(`/api/sites/${idx}`, { method: 'DELETE' });
                        alert('删除成功');
                        const newSites = await api('/api/sites');
                        renderCards(newSites);
                        renderSiteManageList(newSites);
                    } catch (e) { alert(e.message); }
                });
                div.appendChild(item);
            });
        }

        document.getElementById('addUserBtn').addEventListener('click', async () => {
            const username = document.getElementById('newUser').value.trim();
            const password = document.getElementById('newPass').value;
            if (!username || !password) return alert('账号密码不能为空');
            try {
                await api('/api/users', { method: 'POST', body: JSON.stringify({ username, password }) });
                alert('添加成功');
                document.getElementById('newUser').value = '';
                document.getElementById('newPass').value = '';
                const users = await api('/api/users');
                renderUserList(users);
            } catch (e) { alert(e.message); }
        });

        document.getElementById('addSiteBtn').addEventListener('click', async () => {
            const name = document.getElementById('newSiteName').value.trim();
            const url = document.getElementById('newSiteUrl').value.trim();
            const desc = document.getElementById('newSiteDesc').value.trim();
            const seal = document.getElementById('newSiteSeal').value.trim();
            if (!name || !url) return alert('网站名称和网址必填');
            try {
                await api('/api/sites', { method: 'POST', body: JSON.stringify({ name, url, desc, seal }) });
                alert('添加成功');
                ['newSiteName', 'newSiteUrl', 'newSiteDesc', 'newSiteSeal'].forEach(id => document.getElementById(id).value = '');
                const sites = await api('/api/sites');
                renderCards(sites);
                renderSiteManageList(sites);
            } catch (e) { alert(e.message); }
        });

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        window.addEventListener('load', async () => {
            if (token) {
                try {
                    await api('/api/sites');
                    try {
                        await api('/api/users');
                        currentUser = { username: 'zlm', role: 'admin' };
                    } catch {
                        currentUser = { username: '用户', role: 'user' };
                    }
                    showMainApp();
                } catch (e) {
                    token = '';
                    localStorage.removeItem('gufeng_token');
                    showLoginScreen();
                }
            } else {
                showLoginScreen();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万壑松风 · 雅集</title>
    <!-- 引入独立 CSS 文件 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 登录界面 -->
<div id="loginScreen" class="login-container">
    <div class="login-title">万壑松风</div>
    <div class="login-subtitle">· 雅集 · 登入</div>
    <div class="input-group">
        <label>账号</label>
        <input type="text" id="usernameInput" placeholder="输入账号" autocomplete="off">
    </div>
    <div class="input-group">
        <label>密码</label>
        <input type="password" id="passwordInput" placeholder="输入密码">
    </div>
    <div class="error-msg" id="loginError"></div>
    <button class="btn btn-login" id="loginBtn">登 录</button>
    <button class="btn btn-guest" id="guestBtn">游客模式 · 直接进入</button>
    <div style="margin-top:16px; font-size:0.7rem; color:var(--ink-lighter);">管理员演示: zlm / zlm20130503</div>
</div>

<!-- 主界面 -->
<div id="mainApp" class="main-app">
    <div style="text-align:center;">
        <div class="header-plaque">万壑松风 · 雅集</div>
    </div>
    <div class="toolbar">
        <span class="role-badge" id="roleDisplay"></span>
        <button class="btn-sm" id="logoutBtn">退出登录</button>
    </div>
    <div id="cardsContainer" class="cards-grid"></div>

    <!-- 管理员面板 -->
    <div id="adminPanel" class="admin-panel" style="display:none;">
        <h3>⚙️ 管理员设置</h3>
        <div style="display:flex; gap:20px; flex-wrap:wrap;">
            <div style="flex:1; min-width:200px;">
                <h4>账号管理</h4>
                <div style="display:flex; gap:6px; margin-bottom:10px;">
                    <input type="text" id="newUser" placeholder="新账号" style="flex:1; padding:6px;">
                    <input type="password" id="newPass" placeholder="密码" style="flex:1; padding:6px;">
                    <button class="btn-sm" id="addUserBtn">添加</button>
                </div>
                <div id="userList" style="max-height:150px; overflow-y:auto;"></div>
            </div>
            <div style="flex:1; min-width:250px;">
                <h4>网站列表管理</h4>
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <input type="text" id="newSiteName" placeholder="网站名称" style="padding:6px;">
                    <input type="text" id="newSiteUrl" placeholder="网址 (https://...)" style="padding:6px;">
                    <input type="text" id="newSiteDesc" placeholder="简短描述" style="padding:6px;">
                    <input type="text" id="newSiteSeal" placeholder="印章文字 (1-2字)" maxlength="2" style="padding:6px;">
                    <button class="btn-sm" id="addSiteBtn">添加网站</button>
                </div>
                <div id="siteManageList" style="margin-top:14px; max-height:200px; overflow-y:auto;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ================== 前端配置 ==================
    // ⚠️ 请将下面地址改为你的 Cloudflare Tunnel 地址（末尾不要加 /）
    const API_BASE = 'https://lock-laws-lightning-booking.trycloudflare.com';

    let token = localStorage.getItem('gufeng_token') || '';
    let currentUser = null;

    // 通用请求函数
    async function api(url, options = {}) {
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Bearer ${token}`;
        const res = await fetch(`${API_BASE}${url}`, {
            ...options,
            headers: { ...headers, ...options.headers }
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '请求失败');
        return data;
    }

    function showLoginScreen() {
        document.getElementById('loginScreen').style.display = 'block';
        document.getElementById('mainApp').style.display = 'none';
        document.body.style.display = 'flex';
        document.body.style.alignItems = 'center';
    }

    function showMainApp() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.body.style.display = 'block';
        document.body.style.alignItems = 'unset';
        renderMain();
    }

    document.getElementById('loginBtn').addEventListener('click', async () => {
        const username = document.getElementById('usernameInput').value.trim();
        const password = document.getElementById('passwordInput').value;
        const errorDiv = document.getElementById('loginError');
        if (!username || !password) {
            errorDiv.textContent = '请输入账号和密码';
            return;
        }
        try {
            const res = await api('/api/login', {
                method: 'POST',
                body: JSON.stringify({ username, password })
            });
            token = res.token;
            localStorage.setItem('gufeng_token', token);
            currentUser = { username: res.username, role: res.role };
            errorDiv.textContent = '';
            showMainApp();
        } catch (err) {
            errorDiv.textContent = err.message;
        }
    });

    document.getElementById('guestBtn').addEventListener('click', () => {
        token = '';
        localStorage.removeItem('gufeng_token');
        currentUser = { username: '游客', role: 'guest' };
        showMainApp();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        token = '';
        localStorage.removeItem('gufeng_token');
        currentUser = null;
        showLoginScreen();
    });

    async function renderMain() {
        if (!currentUser) {
            console.warn('currentUser 为空，返回登录页');
            showLoginScreen();
            return;
        }
        document.getElementById('roleDisplay').textContent = currentUser.role === 'admin' ? '🔑 管理员' : '👤 游客';
        const adminPanel = document.getElementById('adminPanel');
        adminPanel.style.display = currentUser.role === 'admin' ? 'block' : 'none';

        try {
            const sites = await api('/api/sites');
            renderCards(sites);
        } catch (err) {
            console.error(err);
            document.getElementById('cardsContainer').innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--vermillion);">加载失败，请检查网络</p>';
        }

        if (currentUser.role === 'admin') {
            try {
                const users = await api('/api/users');
                renderUserList(users);
            } catch (e) { console.error(e); }
            try {
                const sites = await api('/api/sites');
                renderSiteManageList(sites);
            } catch (e) { console.error(e); }
        }
    }

    function renderCards(sites) {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = '';
        if (!sites.length) {
            container.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--ink-lighter);">暂无网站</p>';
            return;
        }
        sites.forEach(site => {
            const a = document.createElement('a');
            a.className = 'card-link';
            a.href = site.url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.innerHTML = `
                <span class="card-seal">${escapeHtml(site.seal) || '🔗'}</span>
                <span class="card-content">
                    <h3>${escapeHtml(site.name)}</h3>
                    <span class="card-desc">${escapeHtml(site.desc)}</span>
                </span>
            `;
            container.appendChild(a);
        });
    }

    function renderUserList(users) {
        const div = document.getElementById('userList');
        div.innerHTML = '';
        users.forEach(user => {
            const item = document.createElement('div');
            item.className = 'list-item';
            item.innerHTML = `
                <span>${escapeHtml(user.username)} ${user.username==='zlm'?'(管理员)':''}</span>
                ${user.username!=='zlm' ? '<button class="btn-sm del-user-btn">删除</button>' : ''}
            `;
            if (user.username !== 'zlm') {
                item.querySelector('.del-user-btn').addEventListener('click', async () => {
                    if (!confirm(`确定删除账号 ${user.username} 吗？`)) return;
                    try {
                        await api(`/api/users/${user.username}`, { method: 'DELETE' });
                        alert('删除成功');
                        const users = await api('/api/users');
                        renderUserList(users);
                    } catch (e) { alert(e.message); }
                });
            }
            div.appendChild(item);
        });
    }

    function renderSiteManageList(sites) {
        const div = document.getElementById('siteManageList');
        div.innerHTML = '';
        sites.forEach((site, idx) => {
            const item = document.createElement('div');
            item.className = 'list-item';
            item.innerHTML = `
                <span style="flex:1;">${escapeHtml(site.name)} (${escapeHtml(site.url)})</span>
                <button class="btn-sm del-site-btn">删除</button>
            `;
            item.querySelector('.del-site-btn').addEventListener('click', async () => {
                if (!confirm(`确定删除网站 "${site.name}" 吗？`)) return;
                try {
                    await api(`/api/sites/${idx}`, { method: 'DELETE' });
                    alert('删除成功');
                    const newSites = await api('/api/sites');
                    renderCards(newSites);
                    renderSiteManageList(newSites);
                } catch (e) { alert(e.message); }
            });
            div.appendChild(item);
        });
    }

    document.getElementById('addUserBtn').addEventListener('click', async () => {
        const username = document.getElementById('newUser').value.trim();
        const password = document.getElementById('newPass').value;
        if (!username || !password) return alert('账号密码不能为空');
        try {
            await api('/api/users', { method: 'POST', body: JSON.stringify({ username, password }) });
            alert('添加成功');
            document.getElementById('newUser').value = '';
            document.getElementById('newPass').value = '';
            const users = await api('/api/users');
            renderUserList(users);
        } catch (e) { alert(e.message); }
    });

    document.getElementById('addSiteBtn').addEventListener('click', async () => {
        const name = document.getElementById('newSiteName').value.trim();
        const url = document.getElementById('newSiteUrl').value.trim();
        const desc = document.getElementById('newSiteDesc').value.trim();
        const seal = document.getElementById('newSiteSeal').value.trim();
        if (!name || !url) return alert('网站名称和网址必填');
        try {
            await api('/api/sites', { method: 'POST', body: JSON.stringify({ name, url, desc, seal }) });
            alert('添加成功');
            ['newSiteName','newSiteUrl','newSiteDesc','newSiteSeal'].forEach(id => document.getElementById(id).value = '');
            const sites = await api('/api/sites');
            renderCards(sites);
            renderSiteManageList(sites);
        } catch (e) { alert(e.message); }
    });

    function escapeHtml(text) {
        const map = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;' };
        return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    window.addEventListener('load', async () => {
        if (token) {
            try {
                await api('/api/sites');
                try {
                    await api('/api/users');
                    currentUser = { username: 'zlm', role: 'admin' };
                } catch {
                    currentUser = { username: '用户', role: 'user' };
                }
                showMainApp();
            } catch (e) {
                token = '';
                localStorage.removeItem('gufeng_token');
                showLoginScreen();
            }
        } else {
            showLoginScreen();
        }
    });
</script>
</body>
</html>
